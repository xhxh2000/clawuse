<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战斗模拟</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        h1 { color: #e94560; text-align: center; margin-bottom: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* 选择区域 */
        .select-area { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .select-box { flex: 1; text-align: center; }
        .select-box label { display: block; margin-bottom: 10px; font-size: 18px; color: #aaa; }
        .select-box select { width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #0f3460; background: #16213e; color: #eee; }
        
        /* 卡牌图片 */
        .card-display { display: flex; justify-content: space-around; gap: 20px; margin: 30px 0; }
        .card-img { width: 150px; height: 200px; border-radius: 10px; object-fit: contain; background: transparent; border: none; }
        .card-img.grayscale { filter: grayscale(100%); }
        .card-stats { font-size: 11px; text-align: center; color: #aaa; margin-top: 5px; line-height: 1.4; }
        .card-stats .win { color: #4CAF50; }
        .card-stats .lose { color: #888; }
        
        /* 稀有度颜色 */
        .rarity-1 { color: #888; }
        .rarity-2 { color: #4CAF50; }
        .rarity-3 { color: #2196F3; }
        .rarity-4 { color: #9C27B0; }
        .rarity-5 { color: #FFD700; }
        
        /* 按钮 */
        .btn-area { text-align: center; margin: 20px 0; }
        .btn { padding: 15px 40px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-fight { background: #e94560; color: white; }
        .btn-fight:hover { background: #ff6b6b; }
        .btn-fight:disabled { background: #666; cursor: not-allowed; }
        
        .btn-restart { background: #0f3460; color: white; display: none; }
        .btn-restart.show { display: inline-block; }
        
        /* 战斗日志 */
        .battle-log { background: #16213e; border-radius: 10px; padding: 20px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.8; margin-top: 20px; display: none; }
        .battle-log.show { display: block; }
        .battle-log .round { color: #e94560; font-weight: bold; }
        .battle-log .hit { color: #4CAF50; }
        .battle-log .miss { color: #FF5722; }
        .battle-log .dodge { color: #2196F3; }
        .battle-log .crit { color: #FFD700; font-weight: bold; }
        .battle-log .result { color: #e94560; font-size: 18px; text-align: center; margin-top: 10px; }
        
        /* 结果显示 */
        .result-info { display: flex; justify-content: space-around; margin-top: 20px; font-size: 24px; font-weight: bold; }
        .win { color: #4CAF50; }
        .lose { color: #888; }
        
        .back-link { text-align: center; margin-top: 30px; }
        .back-link a { color: #aaa; text-decoration: none; }
        .back-link a:hover { color: #e94560; }
    </style>
</head>
<body>
    <h1>⚔️ 战斗模拟</h1>
    <div class="container">
        <!-- 选择区域 -->
        <div class="select-area">
            <div class="select-box">
                <label>我方角色</label>
                <select id="selectA"></select>
            </div>
            <div class="select-box">
                <label>敌方角色</label>
                <select id="selectB"></select>
            </div>
        </div>
        
        <!-- 显示区域 -->
        <div class="card-display">
            <div>
                <img id="imgA" class="card-img" src="" alt="">
                <div id="statsA" style="font-size:12px;text-align:center;color:#aaa;margin-top:5px;"></div>
            </div>
            <div>
                <img id="imgB" class="card-img" src="" alt="">
                <div id="statsB" style="font-size:12px;text-align:center;color:#aaa;margin-top:5px;"></div>
            </div>
        </div>
        
        <!-- 结果区域 -->
        <div class="result-info" id="resultInfo" style="display:none"></div>
        
        <!-- 按钮 -->
        <div class="btn-area">
            <button id="btnFight" class="btn btn-fight" onclick="startBattle()">⚔️ 开始战斗</button>
        </div>
        
        <!-- 战斗日志 -->
        <div id="battleLog" class="battle-log"></div>
        
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>

    <script>
        let userCards = [];
        let allCards = {};
        const rarityColors = {};
        
        // 获取用户ID
        let userId = localStorage.getItem('user_id');
        if (!userId) {
            // 未登录时使用默认用户
            userId = '1';
            console.log('未登录，使用默认用户ID:', userId);
        } else {
            console.log('当前用户ID:', userId);
        }
        
        // 加载数据
        async function loadData() {
            // 加载稀有度配置
            const respRarity = await fetch('game_api.php?action=get_rarity');
            const dataRarity = await respRarity.json();
            if (dataRarity.code === 200 && dataRarity.rarity) {
                dataRarity.rarity.forEach(r => {
                    rarityColors[r.rarity] = r.color || '#888';
                });
            } else {
                // 使用默认颜色
                [1,2,3,4,5].forEach(r => rarityColors[r] = ['#888','#4CAF50','#2196F3','#9C27B0','#FFD700'][r-1]);
            }
            
            // 加载用户卡牌
            const resp1 = await fetch('game_api.php?action=get_my_cards&user_id=' + userId);
            const data1 = await resp1.json();
            userCards = data1.code === 200 ? data1.cards || [] : [];
            
            // 加载所有卡牌数据
            const resp2 = await fetch('game_api.php?action=get_all');
            const data2 = await resp2.json();
            if (data2.code === 200) {
                data2.characters.forEach(c => {
                    allCards[c.id] = c;
                });
            }
            
            // 填充下拉菜单
            populateSelects();
        }
        
        function populateSelects() {
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            selectA.innerHTML = '<option value="">-- 选择卡牌 --</option>';
            selectB.innerHTML = '<option value="">-- 选择卡牌 --</option>';
            
            userCards.forEach(uc => {
                const name = uc.name || '未知';
                const rarity = uc.rarity || 3;
                const level = uc.level || 1;
                
                const color = rarityColors[rarity] || '#888';
                const text = `${name} Lv${level}`;
                
                const optA = new Option(text, uc.instance_id || uc.card_id);
                const optB = new Option(text, uc.instance_id || uc.card_id);
                optA.style.color = color;
                optB.style.color = color;
                
                selectA.add(optA);
                selectB.add(optB);
            });
            
            // 默认选择第一张
            if (userCards.length > 0) {
                selectA.value = userCards[0].instance_id || userCards[0].card_id;
                selectB.value = userCards.length > 1 ? (userCards[1].instance_id || userCards[1].card_id) : userCards[0].card_id;
                updateImages();
            }
        }
        
        function updateImages() {
            const imgA = document.getElementById('imgA');
            const imgB = document.getElementById('imgB');
            const statsA = document.getElementById('statsA');
            const statsB = document.getElementById('statsB');
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            const cardA = userCards.find(uc => (uc.instance_id||uc.card_id)==selectA.value);
            const cardB = userCards.find(uc => (uc.instance_id||uc.card_id)==selectB.value);
            
            // 选择新卡牌时移除之前的滤镜效果
            imgA.classList.remove('grayscale');
            imgB.classList.remove('grayscale');
            
            imgA.src = cardA && cardA.image || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="200"><rect fill="%230f3460" width="150" height="200"/><text fill="%23fff" x="75" y="100" text-anchor="middle">?</text></svg>';
            imgB.src = cardB && cardB.image || imgA.src;
            
            // 计算当前数据：基础+(等级-1)*成长值
            const calcStat = (base, growth, level) => {
                const val = (base || 0) + ((level || 1) - 1) * (growth || 0);
                return val;
            };
            
            // 四舍五入取整显示
            const roundStat = (val) => Math.round(val);
            
            // 比较颜色函数：己方>对方=绿色，对方>己方=橙色，相等=白色
            const cmpColor = (valA, valB) => {
                if (valA > valB) return '#4CAF50'; // 绿色加粗
                if (valA < valB) return '#FF9800';
                return '#fff';
            };
            
            const formatStat = (name, valA, valB) => {
                const color = cmpColor(valA, valB);
                const weight = valA > valB ? 'font-weight:bold;' : '';
                return `<span style="color:${color};${weight}">${name}${roundStat(valA)}</span>`;
            };
            
            // 生成星星字符串
            const stars = (n) => '⭐'.repeat(Math.max(1, n || 1));
            // 对齐函数
            const pad = (s, len) => String(s).padStart(len, ' ');
            
            // 显示卡牌属性 - 2行：星星+等级 和 3属性×2行
            if (cardA) {
                const rarity = cardA.rarity || 1;
                const levelA = cardA.level || 1;
                const levelB = cardB ? (cardB.level || 1) : 1;
                const levelColor = cmpColor(levelA, levelB);
                
                const hpA = roundStat(calcStat(cardA.baseStats?.HP, cardA.growthStats?.HP, levelA));
                const atkA = roundStat(calcStat(cardA.baseStats?.ATK, cardA.growthStats?.ATK, levelA));
                const defA = roundStat(calcStat(cardA.baseStats?.DEF, cardA.growthStats?.DEF, levelA));
                const sklA = roundStat(calcStat(cardA.baseStats?.SKL, cardA.growthStats?.SKL, levelA));
                const spdA = roundStat(calcStat(cardA.baseStats?.SPD, cardA.growthStats?.SPD, levelA));
                
                const hpB = cardB ? roundStat(calcStat(cardB.baseStats?.HP, cardB.growthStats?.HP, levelB)) : 0;
                const atkB = cardB ? roundStat(calcStat(cardB.baseStats?.ATK, cardB.growthStats?.ATK, levelB)) : 0;
                const defB = cardB ? roundStat(calcStat(cardB.baseStats?.DEF, cardB.growthStats?.DEF, levelB)) : 0;
                const sklB = cardB ? roundStat(calcStat(cardB.baseStats?.SKL, cardB.growthStats?.SKL, levelB)) : 0;
                const spdB = cardB ? roundStat(calcStat(cardB.baseStats?.SPD, cardB.growthStats?.SPD, levelB)) : 0;
                
                // 第1行：星星 + 等级
                // 第2行：HP ATK
                // 第3行：DEF SKL SPD
                statsA.innerHTML = `<div>${stars(rarity)}</div>` +
                    `<div><span style="color:${levelColor};font-weight:bold;">Lv:${levelA}</span> <span style="color:${cmpColor(hpA,hpB)};font-weight:bold;">HP:${pad(hpA,3)}</span> <span style="color:${cmpColor(atkA,atkB)};font-weight:bold;">ATK:${pad(atkA,3)}</span></div>` +
                    `<div><span style="color:${cmpColor(defA,defB)};font-weight:bold;">DEF:${pad(defA,3)}</span> <span style="color:${cmpColor(sklA,sklB)};font-weight:bold;">SKL:${pad(sklA,3)}</span> <span style="color:${cmpColor(spdA,spdB)};font-weight:bold;">SPD:${pad(spdA,3)}</span></div>`;
            } else {
                statsA.innerHTML = '';
            }
            
            if (cardB) {
                const rarity = cardB.rarity || 1;
                const levelA = cardA ? (cardA.level || 1) : 1;
                const levelB = cardB.level || 1;
                const levelColor = cmpColor(levelB, levelA);
                
                const hpA = cardA ? roundStat(calcStat(cardA.baseStats?.HP, cardA.growthStats?.HP, levelA)) : 0;
                const atkA = cardA ? roundStat(calcStat(cardA.baseStats?.ATK, cardA.growthStats?.ATK, levelA)) : 0;
                const defA = cardA ? roundStat(calcStat(cardA.baseStats?.DEF, cardA.growthStats?.DEF, levelA)) : 0;
                const sklA = cardA ? roundStat(calcStat(cardA.baseStats?.SKL, cardA.growthStats?.SKL, levelA)) : 0;
                const spdA = cardA ? roundStat(calcStat(cardA.baseStats?.SPD, cardA.growthStats?.SPD, levelA)) : 0;
                
                const hpB = roundStat(calcStat(cardB.baseStats?.HP, cardB.growthStats?.HP, levelB));
                const atkB = roundStat(calcStat(cardB.baseStats?.ATK, cardB.growthStats?.ATK, levelB));
                const defB = roundStat(calcStat(cardB.baseStats?.DEF, cardB.growthStats?.DEF, levelB));
                const sklB = roundStat(calcStat(cardB.baseStats?.SKL, cardB.growthStats?.SKL, levelB));
                const spdB = roundStat(calcStat(cardB.baseStats?.SPD, cardB.growthStats?.SPD, levelB));
                
                statsB.innerHTML = `<div>${stars(rarity)}</div>` +
                    `<div><span style="color:${levelColor};font-weight:bold;">Lv:${levelB}</span> <span style="color:${cmpColor(hpB,hpA)};font-weight:bold;">HP:${pad(hpB,3)}</span> <span style="color:${cmpColor(atkB,atkA)};font-weight:bold;">ATK:${pad(atkB,3)}</span></div>` +
                    `<div><span style="color:${cmpColor(defB,defA)};font-weight:bold;">DEF:${pad(defB,3)}</span> <span style="color:${cmpColor(sklB,sklA)};font-weight:bold;">SKL:${pad(sklB,3)}</span> <span style="color:${cmpColor(spdB,spdA)};font-weight:bold;">SPD:${pad(spdB,3)}</span></div>`;
            } else {
                statsB.innerHTML = '';
            }
        }
        
        document.getElementById('selectA').addEventListener('change', () => { filterSelectB(); updateImages(); });
        document.getElementById('selectB').addEventListener('change', () => { filterSelectA(); updateImages(); });
        
        // 过滤已选卡牌
        function filterSelectB() {
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            const valA = selectA.value;
            
            for (let opt of selectB.options) {
                if (valA && opt.value === valA) {
                    opt.disabled = true;
                    opt.text = opt.text.replace(' (已选)', '') + ' (已选)';
                } else {
                    opt.disabled = false;
                    opt.text = opt.text.replace(' (已选)', '');
                }
            }
            
            // 如果当前选中的被禁用了，清空
            if (selectB.value && selectB.options[selectB.selectedIndex]?.disabled) {
                selectB.value = '';
            }
        }
        
        function filterSelectA() {
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            const valB = selectB.value;
            
            for (let opt of selectA.options) {
                if (valB && opt.value === valB) {
                    opt.disabled = true;
                    opt.text = opt.text.replace(' (已选)', '') + ' (已选)';
                } else {
                    opt.disabled = false;
                    opt.text = opt.text.replace(' (已选)', '');
                }
            }
            
            if (selectA.value && selectA.options[selectA.selectedIndex]?.disabled) {
                selectA.value = '';
            }
        }
        
        // 战斗
        async function startBattle() {
            // 使用 card_id (cards表的id) 和当前等级
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            const cardA = userCards.find(uc => (uc.instance_id||uc.card_id)==selectA.value);
            const cardB = userCards.find(uc => (uc.instance_id||uc.card_id)==selectB.value);
            
            const cardIdA = cardA ? cardA.id : parseInt(selectA.value);
            const cardIdB = cardB ? cardB.id : parseInt(selectB.value);
            const levelA = cardA ? cardA.level : 1;
            const levelB = cardB ? cardB.level : 1;
            
            if (!cardIdA || !cardIdB) {
                alert('请选择两个角色');
                return;
            }
            
            // 清空之前结果
            document.getElementById('battleLog').classList.add('show');
            document.getElementById('battleLog').innerHTML = '⚔️ 战斗进行中...';
            document.getElementById('imgA').classList.remove('grayscale');
            document.getElementById('imgB').classList.remove('grayscale');
            
            // 清空之前战斗结果显示
            const statsA = document.getElementById('statsA');
            const statsB = document.getElementById('statsB');
            if (statsA.innerHTML.includes('胜利') || statsA.innerHTML.includes('失败') || statsA.innerHTML.includes('平手')) {
                updateImages();
            }
            
            try {
                // 传递等级参数
                const resp = await fetch(`battle.php?action=fight&idA=${cardIdA}&idB=${cardIdB}&levelA=${levelA}&levelB=${levelB}`);
                const data = await resp.json();
                
                if (data.code === 200) {
                    showBattleResult(data.data);
                } else {
                    alert(data.msg || '战斗失败');
                }
            } catch(e) {
                // PHP不可用，用JS模拟战斗
                const result = await simulateBattleJS(cardIdA, cardIdB);
                showBattleResult(result);
            }
        }
        
        function showBattleResult(result) {
            const logDiv = document.getElementById('battleLog');
            const statsA = document.getElementById('statsA');
            const statsB = document.getElementById('statsB');
            const selectA = document.getElementById('selectA');
            const selectB = document.getElementById('selectB');
            const cardA = userCards.find(uc => (uc.instance_id||uc.card_id)==selectA.value);
            const cardB = userCards.find(uc => (uc.instance_id||uc.card_id)==selectB.value);
            let html = '';
            
            result.logs.forEach((line, i) => {
                if (line.includes('回合') || line.includes('=== ')) {
                    html += `<div class="round">${line}</div>`;
                } else if (line.includes('闪避')) {
                    html += `<div class="dodge">${line}</div>`;
                } else if (line.includes('未命中') || line.includes('miss')) {
                    html += `<div class="miss">${line}</div>`;
                } else if (line.includes('暴击')) {
                    html += `<div class="crit">${line}</div>`;
                } else if (line.includes('造成') || line.includes('damage')) {
                    html += `<div class="hit">${line}</div>`;
                } else if (line.includes('胜利')) {
                    html += `<div class="result">${line}</div>`;
                } else {
                    html += `<div>${line}</div>`;
                }
            });
            
            logDiv.innerHTML = html;
            
            // 显示结果在角色图片下方
            const resultText = result.result || '';
            // PHP返回 "角色名 胜利!" 有空格
            const isAWin = resultText.includes('胜利') && !resultText.includes(cardB.name) && resultText.includes(cardA.name);
            const isBWin = resultText.includes('胜利') && !resultText.includes(cardA.name) && resultText.includes(cardB.name);
            const isDraw = resultText === '平手' || resultText === '平手 (双输)';
            
            if (isAWin && !isBWin) {
                document.getElementById('imgA').classList.remove('grayscale');
                document.getElementById('imgB').classList.add('grayscale');
                statsA.innerHTML += '<div class="win" style="font-size:14px;font-weight:bold;">胜利!</div>';
                statsB.innerHTML += '<div class="lose" style="font-size:14px;">失败</div>';
            } else if (isBWin && !isAWin) {
                document.getElementById('imgA').classList.add('grayscale');
                document.getElementById('imgB').classList.remove('grayscale');
                statsA.innerHTML += '<div class="lose" style="font-size:14px;">失败</div>';
                statsB.innerHTML += '<div class="win" style="font-size:14px;font-weight:bold;">胜利!</div>';
            } else {
                document.getElementById('imgA').classList.add('grayscale');
                document.getElementById('imgB').classList.add('grayscale');
                statsA.innerHTML += '<div style="font-size:14px;">平手</div>';
                statsB.innerHTML += '<div style="font-size:14px;">平手</div>';
            }
        }
        
        function restart() {
            document.getElementById('battleLog').classList.remove('show');
            document.getElementById('battleLog').innerHTML = '';
            document.getElementById('imgA').classList.remove('grayscale');
            document.getElementById('imgB').classList.remove('grayscale');
            updateImages();
        }
        
        // JS模拟战斗（当PHP不可用时）
        async function simulateBattleJS(idA, idB) {
            const ucA = userCards.find(uc => (uc.instance_id||uc.card_id)==idA);
            const ucB = userCards.find(uc => (uc.instance_id||uc.card_id)==idB);
            
            const calcMax = (base, growth, level=100) => Math.floor(base + growth * (level - 1));
            
            const baseA = ucA.baseStats || {};
            const growthA = ucA.growthStats || {};
            const baseB = ucB.baseStats || {};
            const growthB = ucB.growthStats || {};
            
            const charA = {
                name: ucA.name,
                hp: calcMax(baseA.HP || 0, growthA.HP || 0, ucA.level || 100),
                atk: calcMax(baseA.ATK || 0, growthA.ATK || 0, ucA.level || 100),
                def: calcMax(baseA.DEF || 0, growthA.DEF || 0, ucA.level || 100),
                skl: calcMax(baseA.SKL || 0, growthA.SKL || 0, ucA.level || 100),
                spd: calcMax(baseA.SPD || 0, growthA.SPD || 0, ucA.level || 100),
            };
            const charB = {
                name: ucB.name,
                hp: calcMax(baseB.HP || 0, growthB.HP || 0, ucB.level || 100),
                atk: calcMax(baseB.ATK || 0, growthB.ATK || 0, ucB.level || 100),
                def: calcMax(baseB.DEF || 0, growthB.DEF || 0, ucB.level || 100),
                skl: calcMax(baseB.SKL || 0, growthB.SKL || 0, ucB.level || 100),
                spd: calcMax(baseB.SPD || 0, growthB.SPD || 0, ucB.level || 100),
            };
            
            const logs = [];
            let hpA = charA.hp, hpB = charB.hp;
            const round = 0;
            
            // 先手
            const speedA = charA.spd + Math.floor(Math.random() * 40 - 20);
            const speedB = charB.spd + Math.floor(Math.random() * 40 - 20);
            const first = speedA >= speedB ? 'A' : 'B';
            logs.push(`先手: ${charA.name}(SPD${charA.spd}) vs ${charB.name}(SPD${charB.spd}) - ${first === 'A' ? charA.name : charB.name} 先手`);
            
            for (let r = 1; r <= 10 && hpA > 0 && hpB > 0; r++) {
                logs.push('');
                logs.push(`=== 第${r}回合 ===`);
                
                const order = first === 'A' ? ['A', 'B'] : ['B', 'A'];
                const doubleA = (charA.spd - charB.spd) > 100;
                const doubleB = (charB.spd - charA.spd) > 100;
                if (doubleA) logs.push(`${charA.name} 两动!`);
                if (doubleB) logs.push(`${charB.name} 两动!`);
                
                // A攻击B
                for (let i = 0; i < (doubleA ? 2 : 1) && hpB > 0; i++) {
                    const hitRate = Math.min(95, Math.max(75, 75 + Math.max(0, charA.skl - charB.skl) * 0.8 + Math.max(0, charA.spd - charB.spd) * 0.2));
                    const dodgeRate = Math.min(35, Math.max(5, 5 + Math.max(0, charB.spd - charA.spd) * 0.8 + Math.max(0, charB.skl - charA.skl) * 0.2));
                    const critRate = Math.min(50, Math.max(0, (charA.skl - charB.skl) / 2 + (charA.spd - charB.spd) / 4));
                    
                    const roll = Math.random() * 100;
                    const isHit = roll < hitRate;
                    const isDodge = roll > hitRate && roll < hitRate + dodgeRate;
                    
                    if (isDodge) {
                        logs.push(`${charA.name} 攻击 → ${charB.name} 闪避! (命中率${hitRate.toFixed(1)}%, 闪避率${dodgeRate.toFixed(1)}%)`);
                    } else if (!isHit) {
                        logs.push(`${charA.name} 攻击 → 未命中! (命中率${hitRate.toFixed(1)}%)`);
                    } else {
                        const critRoll = Math.random() * 100;
                        const isCrit = critRoll < critRate;
                        let damage = Math.max(1, charA.atk - charB.def);
                        if (isCrit) damage = Math.max(1, Math.floor(charA.atk * 1.5) - charB.def);
                        hpB -= damage;
 if(hpB<=0){logs.push(charA.name+' 击败 '+charB.name+'!');break;}
                        const critText = isCrit ? ' 暴击!' : '';
                        logs.push(`${charA.name} 攻击 → ${charB.name} 造成${damage}伤害!${critText} (HP: ${hpB + damage} -> ${hpB})`);
                    }
                }
                
                // B攻击A
                for (let i = 0; i < (doubleB ? 2 : 1) && hpA > 0; i++) {
                    const hitRate = Math.min(95, Math.max(75, 75 + Math.max(0, charB.skl - charA.skl) * 0.8 + Math.max(0, charB.spd - charA.spd) * 0.2));
                    const dodgeRate = Math.min(35, Math.max(5, 5 + Math.max(0, charA.spd - charB.spd) * 0.8 + Math.max(0, charA.skl - charB.skl) * 0.2));
                    const critRate = Math.min(50, Math.max(0, (charB.skl - charA.skl) / 2 + (charB.spd - charA.spd) / 4));
                    
                    const roll = Math.random() * 100;
                    const isHit = roll < hitRate;
                    const isDodge = roll > hitRate && roll < hitRate + dodgeRate;
                    
                    if (isDodge) {
                        logs.push(`${charB.name} 攻击 → ${charA.name} 闪避! (命中率${hitRate.toFixed(1)}%, 闪避率${dodgeRate.toFixed(1)}%)`);
                    } else if (!isHit) {
                        logs.push(`${charB.name} 攻击 → 未命中! (命中率${hitRate.toFixed(1)}%)`);
                    } else {
                        const critRoll = Math.random() * 100;
                        const isCrit = critRoll < critRate;
                        let damage = Math.max(1, charB.atk - charA.def);
                        if (isCrit) damage = Math.max(1, Math.floor(charB.atk * 1.5) - charA.def);
                        hpA -= damage;
 if(hpA<=0){logs.push(charB.name+' 击败 '+charA.name+'!');break;}
                        const critText = isCrit ? ' 暴击!' : '';
                        logs.push(`${charB.name} 攻击 → ${charA.name} 造成${damage}伤害!${critText} (HP: ${hpA + damage} -> ${hpA})`);
                    }
                }
                
                logs.push(`第${r}回合结束: ${charA.name} HP${hpA} vs ${charB.name} HP${hpB}`);
            }
            
            logs.push('');
            logs.push('=== 战斗结束 ===');
            
            let result;
            if (hpA <= 0 && hpB <= 0) result = '平手 (双输)';
            else if (hpA <= 0) result = `${charB.name} 胜利!`;
            else if (hpB <= 0) result = `${charA.name} 胜利!`;
            else if (hpA > hpB) result = `平手 - ${charA.name} 总HP剩余${hpA}`;
            else if (hpB > hpA) result = `平手 - ${charB.name} 总HP剩余${hpB}`;
            else result = '平手';
            logs.push(result);
            
            return { cardA: charA.name, cardB: charB.name, result, logs };
        }
        
        // 初始化
        loadData();
    </script>
