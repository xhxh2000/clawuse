<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; min-height: 100vh; }
.header { background: rgba(15,52,96,0.9); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header h1 { color: #e94560; font-size: 20px; }
.currency { background: linear-gradient(135deg, #ffd700, #ffaa00); padding: 5px 15px; border-radius: 15px; color: #000; font-weight: bold; font-size: 14px; }
.container { max-width: 500px; margin: 0 auto; padding: 15px; }
.top-draw-area { min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 20px; }
.card-back { width: 160px; height: 220px; background: linear-gradient(135deg, #e94560, #0f3460); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 50px; box-shadow: 0 8px 30px rgba(233,69,96,0.4); cursor: pointer; }
.card-back::after { content: '🎴'; }
.card-back.drawing { animation: shake 0.3s ease-in-out infinite; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
.result-card { display: none; grid-template-columns: 140px 1fr; gap: 15px; background: #16213e; border-radius: 15px; padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 2px solid rgba(233,69,96,0.3); text-align: left; margin-bottom: 15px; }
.result-card.show { display: grid; }
.result-card-10 { display: none; width: 95%; max-width: 1000px; background: #16213e; border-radius: 15px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 2px solid rgba(233,69,96,0.3); margin-bottom: 15px; }
.result-card-10.show { display: block; }
.result-card-10 h3 { color: #e94560; margin-bottom: 15px; text-align: center; }
.grid-10 { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.grid-10 .grid-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
.grid-10 .card-item { width: calc(20% - 10px); min-width: 120px; background: #16213e; border-radius: 8px; padding: 8px; text-align: center; }
@media (max-width: 600px) { 
  .grid-10 { display: grid; grid-template-columns: repeat(2, 1fr); } 
  .grid-10 .grid-row { display: contents; }
  .grid-10 .card-item { width: auto; min-width: unset; }
}
.grid-10 .card-item { background: #16213e; border-radius: 8px; padding: 8px; text-align: center; }
.grid-10 .card-item.rarity-4 { background: linear-gradient(135deg, #2d1b4e, #4a2c7a); border: 1px solid #9c27b0; }
.grid-10 .card-item.rarity-5 { background: linear-gradient(135deg, #4a2c00, #7a4a00); border: 1px solid #ffd700; }
.grid-10 .card-item .thumb { width: 80px; height: 80px; margin: 0 auto 5px; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.grid-10 .card-item .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
.grid-10 .card-item h4 { font-size: 11px; margin: 3px 0; }
.grid-10 .card-item .stars { font-size: 10px; margin: 2px 0; }
.result-image { width: 100%; height: 180px; background: #16213e; border-radius: 10px; overflow: hidden; }
.result-image img { width: 100%; height: 100%; object-fit: contain; }
.result-info h2 { font-size: 22px; margin-bottom: 4px; }
.result-rarity { font-size: 14px; letter-spacing: 2px; margin-bottom: 6px; }
.result-desc { color: #aaa; font-size: 12px; line-height: 1.4; margin-bottom: 10px; }
.result-stats-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px; }
.result-stats-box h4 { color: #e94560; font-size: 12px; margin-bottom: 6px; text-align: center; }
.result-stats-box .stat-row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
.result-stats-box .stat-label { color: #888; }
.result-stats-box .stat-value { color: #4ade80; font-weight: bold; }
.result-actions { text-align: center; margin-top: 15px; }
.result-actions.hidden { display: none; }
.hidden { display: none !important; }
.draw-btn { background: linear-gradient(135deg, #e94560, #c73e54); color: white; border: none; padding: 10px 30px; font-size: 16px; border-radius: 20px; cursor: pointer; min-width: 100px; }
.draw-btn-10 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
.cost-text { color: #ffd700; margin-top: 8px; font-size: 12px; }
.my-cards { margin-top: 25px; }
.my-cards h2 { color: #e94560; margin-bottom: 15px; border-bottom: 2px solid #0f3460; padding-bottom: 8px; }
.view-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
.view-tab { padding: 8px 20px; background: #0f3460; color: #aaa; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
.view-tab.active { background: #e94560; color: white; }
.filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
.filter-row input, .filter-row select { padding: 6px 10px; background: #0f3460; color: #eee; border: 1px solid #16213e; border-radius: 4px; font-size: 12px; }
.filter-row input { width: 150px; }
.filter-row select { min-width: 100px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
.album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
.album-card { background: #0f3460; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: transform 0.2s; }
.album-card:hover { transform: scale(1.05); }
.album-card.locked { background: #333; cursor: default; }
.album-card.locked:hover { transform: none; }
.album-card.locked .card-thumb { background: inherit; }
.album-card .card-thumb { width: 80px; height: 80px; margin: 0 auto 8px; background: #0f3460; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.album-card .card-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
.album-card h4 { font-size: 12px; margin: 5px 0; }
.album-card .count { font-size: 11px; color: #aaa; }
.album-card.locked .count { color: #666; }
.album-card.locked h4 { color: inherit; }
.my-card { background: linear-gradient(145deg, #0f3460, #1a1a2e); border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.my-card:hover { transform: translateY(-3px); border-color: #e94560; }
.my-card .card-thumb { width: 100%; height: 100px; background: #0f3460; border-radius: 6px; margin-bottom: 6px; overflow: hidden; }
.my-card .card-thumb img { width: 100%; height: 100%; object-fit: contain; }
.my-card h4 { font-size: 12px; margin-bottom: 4px; }
.my-card .count { background: #e94560; color: white; padding: 2px 6px; border-radius: 8px; font-size: 10px; }
.empty { text-align: center; color: #666; padding: 30px; grid-column: 1/-1; }
.rarity-1 { color: #aaa; }
.rarity-2 { color: #00ff00; }
.rarity-3 { color: #4169e1; }
.rarity-4 { color: #9400d3; }
.rarity-5 { color: #ffd700; }
.card-name-1 { color: #ffffff; }
.card-name-2 { color: #4caf50; }
.card-name-3 { color: #2196f3; }
.card-name-4 { color: #9c27b0; }
.card-name-5 { color: #ff9800; font-weight: bold; }
.card-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; justify-content: center; padding: 20px; }
.card-popup.show { display: flex; }
.popup-card { width: 95%; max-width: 750px; border-radius: 10px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 2px solid rgba(233,69,96,0.4); position: relative; max-height: 90vh; overflow-y: auto; }
.popup-card .close-btn { position: absolute; top: 15px; right: 15px; background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
.popup-container { display: flex; gap: 20px; flex-wrap: wrap; }
.popup-image { flex: 0 0 250px; display: flex; justify-content: center; align-items: flex-start; }
.popup-image img { max-width: 100%; max-height: 300px; width: auto; height: auto; border-radius: 10px; object-fit: contain; cursor: pointer; }
.popup-info { flex: 1; min-width: 280px; }
.popup-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
.popup-rarity { font-size: 18px; margin-bottom: 10px; }
.popup-desc { color: #aaa; margin-bottom: 15px; line-height: 1.5; }
.popup-stats { margin-top: 20px; }
.popup-stats h4 { color: #e94560; margin-bottom: 10px; }
.stats-grid-2 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; text-align: center; }
.stats-grid-2 .stat-row { background: #0f3460; padding: 10px; border-radius: 5px; }
.stats-grid-2 .stat-label { display: block; color: #aaa; font-size: 12px; margin-bottom: 5px; }
.stats-grid-2 .stat-value { display: block; font-size: 18px; font-weight: bold; }
.popup-radar { margin-top: 20px; }
.popup-radar canvas { width: 100%; max-width: 300px; height: 300px; margin: 0 auto; display: block; }
.popup-count { text-align: center; margin-top: 15px; font-size: 16px; color: #ffd700; }
.image-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
.image-popup.show { display: flex; }
.new-tag {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #000;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    margin-left: 10px;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.8), 0 0 10px rgba(255, 215, 0, 0.5);
    box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
    display: inline-block;
}
.image-popup img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 10px; }
</style>
</head>
<body>
<div class="header">
<h1>🎮 卡牌游戏</h1>
<div class="currency">💰 <span id="goldAmount">1000</span> 元宝</div>
</div>
<div class="container">
<div class="top-draw-area">
<div class="card-back" id="cardBack" onclick="drawCard()"></div>
<div class="result-card" id="resultCard"></div>
<div class="result-card-10" id="resultCard10"></div>
<div class="result-actions" id="resultActions">
<button class="draw-btn" onclick="drawCard()">单抽</button>
<button class="draw-btn draw-btn-10" onclick="drawCard10()">十连</button>
<p class="cost-text">单抽消耗 <span id="drawCost">100</span> 元宝 | 十连消耗 <span id="drawCost10">900</span> 元宝 (9折)</p>
</div>
</div>
<div class="my-cards">
<h2>📦 我的卡牌</h2>
        <div class="pool-selector" style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
            <label style="color:#aaa;">卡池：</label>
            <select id="poolSelect" onchange="changePool(this.value)" style="padding:8px;background:#0f3460;color:#eee;border:1px solid #0f3460;border-radius:5px;">
                <option value="NIKKE" selected>NIKKE</option>
            </select>
        </div>
        <div id="albumProgress" style="display:none;padding:10px;background:#0f3460;border-radius:8px;margin-bottom:15px;">
            <div style="text-align:center;margin-bottom:10px;">
                <span style="font-size:14px;color:#aaa;">图鉴总达成率</span>
                <span id="totalRateDisplay" style="font-size:24px;font-weight:bold;color:#4caf50;">0%</span>
            </div>
            <div id="progressBars" style="display:flex;flex-direction:column;gap:5px;"></div>
        </div>
        <div class="view-tabs">
            <button class="view-tab active" id="tabMyCards" onclick="switchView('my')">我的卡牌</button>
            <button class="view-tab" id="tabAlbum" onclick="switchView('album')">我的图鉴</button>
        </div>
        <div class="filter-row">
            <input type="text" id="filterName" placeholder="名字搜索..." oninput="applyFilter()">
            <select id="filterRarity" onchange="applyFilter()">
                <option value="">全部稀有度</option>
            </select>
            <select id="filterOwned" onchange="applyFilter()" class="filter-owned hidden">
                <option value="">全部</option>
                <option value="owned">已拥有</option>
                <option value="unowned">未拥有</option>
            </select>
            <button class="view-tab" onclick="resetFilter()" style="padding:6px 15px;font-size:12px;">重置</button>
        </div>
        <div class="cards-grid" id="myCards"></div>
        <div class="album-grid hidden" id="albumGrid"></div>
</div>
</div>
<div class="card-popup" id="cardPopup" onclick="closePopup()">
<div class="popup-card" onclick="event.stopPropagation()">
<button class="close-btn" onclick="closePopup()">关闭</button>
<div class="popup-container">
<div class="popup-image">
<img id="popupImage" src="" alt="" onclick="showFullImage(this.src)">
</div>
<div class="popup-info">
<div id="popupName" class="popup-name"></div>
<div id="popupRarity" class="popup-rarity"></div>
<p id="popupDesc" class="popup-desc"></p>
<div class="popup-stats">
<h4>📊 基础属性</h4>
<div id="popupStatsBox" class="stats-grid-2"></div>
</div>
<div class="popup-radar">
<canvas id="radarCanvas"></canvas>
</div>
</div>
</div>
<div id="popupCount" class="popup-count"></div>
</div>
</div>
<div class="image-popup" id="imagePopup" onclick="closeImagePopup()">
<img id="fullImage" src="">
</div>
<script>
var gameData = null;
var drawConfig = { rarity_weight: [], tag: [], tag_weight: [] };
var rarityConfig = [];
var myGold = 1000;
var myCards = {};
var isDrawing = false;
var currentPool = "NIKKE";
var currentView = 'my';
var filterState = { name: '', rarity: '', owned: '' };
var allCharacters = [];

function changePool(pool) {
    currentPool = pool;
    resetFilter();
    loadData();
}

function getImageUrl(card) {
if (card.image) return card.image;
return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300"><rect fill="#0f3460" width="200" height="300"/><text fill="#fff" font-size="30" x="50%" y="50%" text-anchor="middle" dy=".3em">'+card.name+'</text></svg>');
}

function drawCard() {
if (isDrawing) return;
var cost = gameData.settings.drawCost || 100;
if (myGold < cost) { alert('元宝不足！'); return; }
isDrawing = true;
myGold -= cost;
document.getElementById('goldAmount').textContent = myGold;
var cardBack = document.getElementById('cardBack');
var resultCard = document.getElementById('resultCard');
var resultActions = document.getElementById('resultActions');
resultCard.classList.remove('show');
resultActions.classList.add('hidden');
cardBack.style.display = 'flex';
cardBack.classList.add('drawing');
setTimeout(function() {
var card = doDraw();
cardBack.classList.remove('drawing');
cardBack.style.display = 'none';
showResult(card);
updateAlbumProgress(allCharacters);
if (currentView === 'album') renderAlbum();
isDrawing = false;
}, 2000);
}

function resetDraw() {
var cardBack = document.getElementById('cardBack');
var resultCard = document.getElementById('resultCard');
var resultCard10 = document.getElementById('resultCard10');
var resultActions = document.getElementById('resultActions');
resultCard.classList.remove('show');
resultCard10.classList.remove('show');
var cost = gameData.settings.drawCost || 100;
var cost10 = Math.floor(cost * 10 * 0.9);
resultActions.innerHTML = '<button class="draw-btn" onclick="drawCard()">单抽</button><button class="draw-btn draw-btn-10" onclick="drawCard10()">十连</button><p class="cost-text">单抽消耗 <span id="drawCost">'+cost+'</span> 元宝 | 十连消耗 <span id="drawCost10">'+cost10+'</span> 元宝 (9折)</p>';
resultActions.classList.remove('hidden');
cardBack.style.display = 'flex';
}

function drawCard10() {
if (isDrawing) return;
var cost10 = Math.floor((gameData.settings.drawCost || 100) * 10 * 0.9);
if (myGold < cost10) { alert('元宝不足！'); return; }
isDrawing = true;
myGold -= cost10;
document.getElementById('goldAmount').textContent = myGold;
var cardBack = document.getElementById('cardBack');
var resultCard = document.getElementById('resultCard');
var resultCard10 = document.getElementById('resultCard10');
var resultActions = document.getElementById('resultActions');
resultCard.classList.remove('show');
resultCard10.classList.remove('show');
resultActions.classList.add('hidden');
cardBack.style.display = 'flex';
cardBack.classList.add('drawing');
setTimeout(function() {
var cards = [];
for (var i = 0; i < 10; i++) {
cards.push(doDraw());
}
cardBack.classList.remove('drawing');
cardBack.style.display = 'none';
showResult10(cards);
updateAlbumProgress(allCharacters);
renderAlbum();
var cost10 = Math.floor((gameData.settings.drawCost || 100) * 10 * 0.9);
resultActions.innerHTML = '<button class="draw-btn draw-btn-10" onclick="drawCard10()">再来十连</button><button class="draw-btn" onclick="resetDraw()">返回</button><p class="cost-text">十连消耗 <span id="drawCost10">'+cost10+'</span> 元宝 (9折)</p>';
resultActions.classList.remove('hidden');
isDrawing = false;
}, 2000);
}

function doDraw() {
    var config = drawConfig;
    var rarityWeights = config.rarity_weight || [];
    var selectedTags = config.tag || [];
    var tagWeightMap = {};
    (config.tag_weight || []).forEach(function(tw) {
        var key = Object.keys(tw)[0];
        var val = tw[key];
        tagWeightMap[key] = val;
    });
    
    var allCards = gameData.characters || [];
    
    // 1. Tag 过滤
    var filteredCards = allCards.filter(function(card) {
        var cardTags = card.tags || [];
        return selectedTags.length === 0 || cardTags.some(function(t) { return selectedTags.includes(t); });
    });
    
    // 2. 计算稀有度基础概率（基于权重数组动态长度）
    var rarityCount = rarityWeights.length || 1;
    var totalRarityWeight = rarityWeights.reduce(function(a, b) { return a + b; }, 0);
    
    // 3. 确定稀有度
    var rand = Math.random() * totalRarityWeight;
    var selectedRarity = 1;
    var accumulated = 0;
    for (var r = 1; r <= rarityCount; r++) {
        accumulated += rarityWeights[r - 1] || 0;
        if (rand < accumulated) {
            selectedRarity = r;
            break;
        }
        selectedRarity = r;
    }
    
    // 5. 该稀有度内的卡牌，计算权重
    var rarityCards = filteredCards.filter(function(c) { return c.rarity === selectedRarity; });
    var totalWeight = 0;
    var cardWeights = [];
    
    rarityCards.forEach(function(card) {
        var baseWeight = card.draw_weight || 100;
        var tagAdjustment = 0;
        (card.tags || []).forEach(function(t) {
            if (tagWeightMap[t] !== undefined) {
                tagAdjustment += tagWeightMap[t];
            }
        });
        var finalWeight = Math.max(0, baseWeight + tagAdjustment);
        cardWeights.push({ card: card, weight: finalWeight });
        totalWeight += finalWeight;
    });
    
    // 6. 根据权重抽取
    if (totalWeight === 0 || rarityCards.length === 0) {
        // 如果没有有效卡，随机返回一个
        return filteredCards[Math.floor(Math.random() * filteredCards.length)] || allCards[0];
    }
    
    var drawRand = Math.random() * totalWeight;
    var accumulatedWeight = 0;
    for (var i = 0; i < cardWeights.length; i++) {
        accumulatedWeight += cardWeights[i].weight;
        if (drawRand <= accumulatedWeight) {
            return cardWeights[i].card;
        }
    }
    
    return cardWeights[cardWeights.length - 1].card;
}

function showResult(card) {
var names = getRarityName(card.rarity);
var rarityColor = getRarityColor(card.rarity);
var cost = gameData.settings.drawCost || 100;
var hpPercent = Math.round(card.baseStats.hp / maxStats.hp * 100);
var mpPercent = Math.round(card.baseStats.mp / maxStats.mp * 100);
var atkPercent = Math.round(card.baseStats.attack / maxStats.attack * 100);
var defPercent = Math.round(card.baseStats.defense / maxStats.defense * 100);
var agiPercent = Math.round(card.baseStats.agility / maxStats.agility * 100);
var isNew = !myCards[card.id];
if (!myCards[card.id]) myCards[card.id] = JSON.parse(JSON.stringify(card));
myCards[card.id].count = (myCards[card.id].count || 0) + 1;
var newTag = isNew ? '<span class="new-tag">新！</span>' : '';
var rc = document.getElementById('resultCard');
rc.innerHTML = '<div class="result-image"><img src="'+getImageUrl(card)+'" alt="'+card.name+'"></div><div class="result-info"><h2 class="rarity-'+card.rarity+'" style="color:'+rarityColor+'">'+card.name+newTag+'</h2><div class="result-rarity" style="color:'+rarityColor+'">'+'⭐'.repeat(card.rarity)+' '+names+'</div><p class="result-desc">'+(card.description||'')+'</p><div class="result-stats-box"><h4>📊 基础属性</h4><div class="stat-row"><span class="stat-label">HP</span><span class="stat-value" style="color:'+getStatColor(card.baseStats.hp, 'hp')+'">'+card.baseStats.hp+'</span></div><div class="stat-row"><span class="stat-label">MP</span><span class="stat-value" style="color:'+getStatColor(card.baseStats.mp, 'mp')+'">'+card.baseStats.mp+'</span></div><div class="stat-row"><span class="stat-label">攻击</span><span class="stat-value" style="color:'+getStatColor(card.baseStats.attack, 'attack')+'">'+card.baseStats.attack+'</span></div><div class="stat-row"><span class="stat-label">防御</span><span class="stat-value" style="color:'+getStatColor(card.baseStats.defense, 'defense')+'">'+card.baseStats.defense+'</span></div><div class="stat-row"><span class="stat-label">敏捷</span><span class="stat-value" style="color:'+getStatColor(card.baseStats.agility, 'agility')+'">'+card.baseStats.agility+'</span></div></div></div>';
document.getElementById('resultActions').innerHTML = '<button class="draw-btn" onclick="drawCard()">再抽一张</button><button class="draw-btn" onclick="resetDraw()">返回</button><p class="cost-text">消耗 '+cost+' 元宝</p>';
resultActions.classList.remove('hidden');
rc.classList.add('show');
renderMyCards();
}

function renderMyCards() {
var container = document.getElementById('myCards');
var cards = Object.values(myCards);

// Apply filter
cards = cards.filter(function(card) {
    if (filterState.name && !card.name.toLowerCase().includes(filterState.name)) return false;
    if (filterState.rarity && card.rarity !== parseInt(filterState.rarity)) return false;
    return true;
});

// Sort by rarity (descending)
cards.sort(function(a, b) { return b.rarity - a.rarity; });

if (cards.length === 0) { container.innerHTML = '<div class="empty">还没有卡牌，快去抽卡吧！</div>'; return; }
var html = '';
cards.forEach(function(card) {
html += '<div class="my-card" onclick="showCardPopup('+card.id+')"><div class="card-thumb"><img src="'+getImageUrl(card)+'" alt="'+card.name+'"></div><h4 class="rarity-'+card.rarity+'">'+card.name+'</h4><span class="count">x'+card.count+'</span></div>';
});
container.innerHTML = html;
}

function getStatColor(value, statName) {
var max = maxStats[statName];
var min = minStats[statName];
var range = max - min;
if (range === 0) return '#aaa';
var percent = (value - min) / range * 100;
if (percent >= 100) return '#ff0000';
if (percent >= 80) return '#ffd700';
if (percent >= 60) return '#9400d3';
if (percent >= 40) return '#4169e1';
if (percent >= 20) return '#00ff00';
return '#ffffff';
}

// 获取稀有度名称
function getRarityName(rarity) {
    if (!rarityConfig || rarityConfig.length === 0) {
        return ['', '普通', '稀有', '杰出', '史诗', '传说'][rarity] || '未知';
    }
    var config = rarityConfig.find(function(c) { return c.rarity === rarity; });
    return config ? config.name : '未知';
}

// 获取稀有度颜色
function getRarityColor(rarity) {
    if (!rarityConfig || rarityConfig.length === 0) {
        return ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800'][rarity] || '#fff';
    }
    var config = rarityConfig.find(function(c) { return c.rarity === rarity; });
    return config ? config.color : '#fff';
}

// 动态填充稀有度筛选下拉框
function populateRarityFilter() {
    var select = document.getElementById('filterRarity');
    if (!select || !rarityConfig || rarityConfig.length === 0) return;
    
    // 保留"全部稀有度"选项
    select.innerHTML = '<option value="">全部稀有度</option>';
    
    // 动态添加稀有度选项
    var stars = ['', '⭐', '⭐⭐', '⭐⭐⭐', '⭐⭐⭐⭐', '⭐⭐⭐⭐⭐', '⭐⭐⭐⭐⭐⭐'];
    rarityConfig.forEach(function(cfg) {
        var option = document.createElement('option');
        option.value = cfg.rarity;
        var starStr = stars[cfg.rarity] || '⭐'.repeat(cfg.rarity);
        option.textContent = starStr + ' ' + cfg.name;
        select.appendChild(option);
    });
}

// 全局淡化颜色函数
function lightenColor(hex, factor) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    r = Math.round(r + (255 - r) * factor);
    g = Math.round(g + (255 - g) * factor);
    b = Math.round(b + (255 - b) * factor);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// 更新图鉴进度条
function updateAlbumProgress(allCards) {
    var container = document.getElementById('progressBars');
    var totalOwned = 0;
    var totalCards = 0;
    var allComplete = true;
    
    // 从 rarity_config.json 获取稀有度名称和颜色
    var rarityNames = [];
    var rarityColors = [];
    
    if (rarityConfig && rarityConfig.length > 0) {
        rarityConfig.forEach(function(cfg) {
            if (cfg.rarity >= 1 && cfg.rarity <= 5) {
                rarityNames[cfg.rarity] = cfg.name;
                rarityColors[cfg.rarity] = cfg.color;
            }
        });
    }
    
    // Fallback if config not loaded yet
    if (rarityNames.length === 0) {
        rarityNames = ['', '普通', '稀有', '杰出', '史诗', '传说'];
        rarityColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800'];
    }
    
    // 生成淡化的背景色
    function lightenColor(hex, factor) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        r = Math.round(r + (255 - r) * factor);
        g = Math.round(g + (255 - g) * factor);
        b = Math.round(b + (255 - b) * factor);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
    }
    
    var html = '';
    for (var r = 1; r <= rarityConfig.length; r++) {
        var rCards = allCards.filter(function(c) { return c.rarity === r; });
        var rOwned = rCards.filter(function(c) { return myCards[c.id]; }).length;
        var rTotal = rCards.length;
        var rRate = rTotal > 0 ? (rOwned / rTotal * 100) : 0;
        
        totalOwned += rOwned;
        totalCards += rTotal;
        if (rRate < 100) allComplete = false;
        
        var isComplete = rRate >= 100;
        var rName = rarityNames[r] || '未知';
        var barColor = rarityColors[r] || '#fff';
        
        var rowStyle = '';
        var nameStyle = 'width:70px;font-size:12px;color:'+barColor+';';
        var textStyle = "width:90px;font-size:12px;text-align:right;color:" + barColor + ";";
        
        if (isComplete) {
            rowStyle = 'background:rgba(255,215,0,0.15);padding:5px;border-radius:5px;';
            nameStyle = 'width:70px;font-size:12px;color:'+barColor+';font-weight:bold;';
            textStyle = 'width:90px;font-size:12px;text-align:right;color:'+barColor+';font-weight:bold;';
        }
        
        // 进度条渐变背景和填充
        var barFillStyle = 'height:16px;border-radius:8px;transition:width 0.3s;position:relative;';
        var innerBar = '<div style="height:8px;background:'+barColor+';border-radius:4px;margin-top:4px;opacity:0.6;"></div>';
        var gradientFill = '';
        if (isComplete) {
            gradientFill = 'background:linear-gradient(180deg, '+barColor+' 0%, ' + lightenColor(barColor, 0.4) + ' 50%, '+barColor+' 100%);box-shadow:0 0 10px '+barColor+';';
        } else {
            gradientFill = 'background:linear-gradient(180deg, '+barColor+' 0%, ' + lightenColor(barColor, 0.3) + ' 100%);';
        }
        
        html += '<div style="display:flex;align-items:center;gap:10px;'+rowStyle+'">' +
            '<span style="'+nameStyle+'">' + r + '⭐ ' + rName + '</span>' +
            '<div style="flex:1;height:20px;background:#1a1a2e;border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);border:1px solid #333;">' +
                '<div style="width:'+rRate+'%;'+barFillStyle+gradientFill+'"></div>' +
            '</div>' +
            '<span style="'+textStyle+'">' + rOwned + '/' + rTotal + '</span>' +
        '</div>';
    }
    
    container.innerHTML = html;
    
    // 更新总达成率
    var overallRate = totalCards > 0 ? (totalOwned / totalCards * 100) : 0;
    var totalDisplay = document.getElementById('totalRateDisplay');
    totalDisplay.textContent = overallRate.toFixed(0) + '%';
    
    if (allComplete && totalCards > 0) {
        totalDisplay.style.color = '#ffd700';
        totalDisplay.style.textShadow = '0 0 30px #ffd700, 0 0 60px #ffd700';
        totalDisplay.style.fontSize = '32px';
        container.style.boxShadow = '0 0 30px rgba(255, 215, 0, 0.5), inset 0 0 20px rgba(255, 215, 0, 0.1)';
    } else {
        totalDisplay.style.color = '#4caf50';
        totalDisplay.style.textShadow = 'none';
        totalDisplay.style.fontSize = '24px';
        container.style.boxShadow = 'none';
    }
    
    // 显示/隐藏进度条
    document.getElementById('albumProgress').style.display = 'block';
}

function switchView(view) {
    currentView = view;
    document.getElementById('tabMyCards').classList.toggle('active', view === 'my');
    document.getElementById('tabAlbum').classList.toggle('active', view === 'album');
    document.getElementById('myCards').classList.toggle('hidden', view !== 'my');
    document.getElementById('albumGrid').classList.toggle('hidden', view !== 'album');
    document.getElementById('filterOwned').classList.toggle('hidden', view !== 'album');
    if (view === 'my') renderMyCards();
    else renderAlbum();
}

function applyFilter() {
    filterState.name = document.getElementById('filterName').value.trim().toLowerCase();
    filterState.rarity = document.getElementById('filterRarity').value;
    filterState.owned = document.getElementById('filterOwned').value;
    if (currentView === 'my') renderMyCards();
    else renderAlbum();
}

function resetFilter() {
    document.getElementById('filterName').value = '';
    document.getElementById('filterRarity').value = '';
    document.getElementById('filterOwned').value = '';
    filterState = { name: '', rarity: '', owned: '' };
    if (currentView === 'my') renderMyCards();
    else renderAlbum();
}

function renderAlbum() {
    var container = document.getElementById('albumGrid');
    var allCards = allCharacters || [];
    
    // 从 rarity_config.json 获取稀有度名称和颜色
    var rarityNames = [];
    var rarityColors = [];
    
    if (rarityConfig && rarityConfig.length > 0) {
        rarityConfig.forEach(function(cfg) {
            if (cfg.rarity >= 1 && cfg.rarity <= 5) {
                rarityNames[cfg.rarity] = cfg.name;
                rarityColors[cfg.rarity] = cfg.color;
            }
        });
    }
    
    // Fallback if config not loaded yet
    if (rarityNames.length === 0) {
        rarityNames = ['', '普通', '稀有', '杰出', '史诗', '传说'];
        rarityColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800'];
    }
    
    // 生成淡化的背景色
    function lightenColor(hex, factor) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        r = Math.round(r + (255 - r) * factor);
        g = Math.round(g + (255 - g) * factor);
        b = Math.round(b + (255 - b) * factor);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
    }
    
    // 遍历所有卡片，设置背景色
    allCards.forEach(function(card) {
        card._bgColor = lightenColor(rarityColors[card.rarity] || '#666', 0.85);
    });
    
    var filtered = allCards.filter(function(card) {
        var owned = myCards[card.id];
        if (filterState.name && !card.name.toLowerCase().includes(filterState.name)) return false;
        if (filterState.rarity && card.rarity !== parseInt(filterState.rarity)) return false;
        if (filterState.owned === 'owned' && !owned) return false;
        if (filterState.owned === 'unowned' && owned) return false;
        return true;
    });
    
    // Sort by rarity (descending)
    filtered.sort(function(a, b) { return b.rarity - a.rarity; });
    
    if (filtered.length === 0) { container.innerHTML = '<div class="empty">没有找到卡牌</div>'; return; }
    
    // 计算各稀有度达成率并更新进度条
    updateAlbumProgress(allCards);
    
    var html = '';
    filtered.forEach(function(card) {
        var owned = myCards[card.id];
        var stars = '⭐'.repeat(card.rarity);
        if (owned) {
            html += '<div class="album-card" onclick="showCardPopup('+card.id+')" style="background:'+card._bgColor+';"><div class="card-thumb" style="background:'+card._bgColor+';"><img src="'+getImageUrl(card)+'" alt="'+card.name+'"></div><h4 style="color:'+rarityColors[card.rarity]+';">'+card.name+'</h4><div class="album-stars" style="font-size:10px;color:'+rarityColors[card.rarity]+';word-break:break-all;">'+stars+'</div><span class="count">x'+owned.count+'</span></div>';
        } else {
            html += '<div class="album-card locked"><div class="card-thumb" style="background:inherit;"><img src="'+getImageUrl(card)+'" alt="'+card.name+'" style="filter:grayscale(100%) brightness(0.7);"></div><h4 style="color:'+rarityColors[card.rarity]+';">'+card.name+'</h4><div class="album-stars" style="font-size:10px;color:'+rarityColors[card.rarity]+';word-break:break-all;filter:grayscale(50%);">'+stars+'</div><span class="count">未拥有</span></div>';
        }
    });
    container.innerHTML = html;
}

function drawRadar(card) {
var canvas = document.getElementById('radarCanvas');
var ctx = canvas.getContext('2d');
var w = canvas.width = canvas.offsetWidth;
var h = canvas.height = canvas.offsetHeight;
var cx = w / 2;
var cy = h / 2;
var r = Math.min(w, h) / 2 - 30;
var labels = ['HP', 'MP', '攻击', '防御', '敏捷'];
var stats = [
Math.round(card.baseStats.hp / maxStats.hp * 100),
Math.round(card.baseStats.mp / maxStats.mp * 100),
Math.round(card.baseStats.attack / maxStats.attack * 100),
Math.round(card.baseStats.defense / maxStats.defense * 100),
Math.round(card.baseStats.agility / maxStats.agility * 100)
];
var maxVal = 100;
var angleStep = (Math.PI * 2) / 5;
ctx.clearRect(0, 0, w, h);
// 画背景圆
for (var i = 1; i <= 5; i++) {
ctx.beginPath();
ctx.arc(cx, cy, r * i / 5, 0, Math.PI * 2);
ctx.strokeStyle = '#333';
ctx.stroke();
}
// 画轴线
for (var i = 0; i < 5; i++) {
ctx.beginPath();
ctx.moveTo(cx, cy);
ctx.lineTo(cx + Math.cos(i * angleStep - Math.PI/2) * r, cy + Math.sin(i * angleStep - Math.PI/2) * r);
ctx.strokeStyle = '#333';
ctx.stroke();
ctx.fillStyle = '#aaa';
ctx.font = '12px Arial';
ctx.textAlign = 'center';
ctx.fillText(labels[i], cx + Math.cos(i * angleStep - Math.PI/2) * (r + 20), cy + Math.sin(i * angleStep - Math.PI/2) * (r + 20));
}
// 画数据区域
ctx.beginPath();
for (var i = 0; i < 5; i++) {
var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
if (i === 0) ctx.moveTo(x, y);
else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
ctx.fill();
ctx.strokeStyle = '#e94560';
ctx.lineWidth = 2;
ctx.stroke();
// 画数据点
for (var i = 0; i < 5; i++) {
var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
ctx.beginPath();
ctx.arc(x, y, 5, 0, Math.PI * 2);
ctx.fillStyle = '#e94560';
ctx.fill();
}
}

var maxStats = {hp:0, mp:0, attack:0, defense:0, agility:0};
var minStats = {hp:Infinity, mp:Infinity, attack:Infinity, defense:Infinity, agility:Infinity};

function calcMaxStats() {
if (!gameData || !gameData.characters) return;
gameData.characters.forEach(function(c) {
if (c.baseStats.hp > maxStats.hp) maxStats.hp = c.baseStats.hp;
if (c.baseStats.hp < minStats.hp) minStats.hp = c.baseStats.hp;
if (c.baseStats.mp > maxStats.mp) maxStats.mp = c.baseStats.mp;
if (c.baseStats.mp < minStats.mp) minStats.mp = c.baseStats.mp;
if (c.baseStats.attack > maxStats.attack) maxStats.attack = c.baseStats.attack;
if (c.baseStats.attack < minStats.attack) minStats.attack = c.baseStats.attack;
if (c.baseStats.defense > maxStats.defense) maxStats.defense = c.baseStats.defense;
if (c.baseStats.defense < minStats.defense) minStats.defense = c.baseStats.defense;
if (c.baseStats.agility > maxStats.agility) maxStats.agility = c.baseStats.agility;
if (c.baseStats.agility < minStats.agility) minStats.agility = c.baseStats.agility;
});
if (minStats.hp === Infinity) minStats.hp = 0;
if (minStats.mp === Infinity) minStats.mp = 0;
if (minStats.attack === Infinity) minStats.attack = 0;
if (minStats.defense === Infinity) minStats.defense = 0;
if (minStats.agility === Infinity) minStats.agility = 0;
}

function loadData() {
    // 加载稀有度配置
    fetch('data/sys_config/rarity_config.json').then(function(res) { return res.json(); }).then(function(config) {
        rarityConfig = config;
        populateRarityFilter();
    }).catch(function(e) {
        console.error('加载稀有度配置失败:', e);
        rarityConfig = [];
    });
    
    // 加载卡池数据
    fetch('data/cards/' + currentPool + '.json').then(function(res) { return res.json(); }).then(function(data) {
        gameData = data;
        allCharacters = data.characters || [];
        calcMaxStats();
        document.getElementById('goldAmount').textContent = myGold;
        document.getElementById('drawCost').textContent = data.settings.drawCost || 100;
        document.getElementById('drawCost10').textContent = Math.floor((data.settings.drawCost || 100) * 10 * 0.9);
        renderMyCards();
        renderAlbum();
        
        // 加载抽卡配置
        return fetch('data/card_draw_config/draw_default.json');
    }).then(function(res) { return res.json(); }).then(function(config) {
        console.log('抽卡配置加载:', config);
        drawConfig = config;
    }).catch(function(e) { 
        console.error(e); 
        drawConfig = { rarity_weight: [], tag: [], tag_weight: [] };
    });
}

function showResult10(cards) {
var container = document.getElementById('resultCard10');
var rarityColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800'];

// Before updating, record which cards are newly obtained
var wasNewBefore = {};
cards.forEach(function(card) {
if (!myCards[card.id] && !wasNewBefore[card.id]) {
wasNewBefore[card.id] = true;
}
});

// Update counts
cards.forEach(function(card) {
if (!myCards[card.id]) myCards[card.id] = JSON.parse(JSON.stringify(card));
myCards[card.id].count = (myCards[card.id].count || 0) + 1;
});

// Display: only first occurrence of each new card shows "新！"
var firstSeen = {};
var html = '<h3>🎉 十连抽结果</h3><div class="grid-10">';
// 2-3-3-2 layout
var layout = [2, 3, 3, 2];
var idx = 0;
layout.forEach(function(count, rowIdx) {
  html += '<div class="grid-row">';
  for (var i = 0; i < count && idx < cards.length; i++) {
    var card = cards[idx++];
    var showNew = false;
    if (wasNewBefore[card.id] && !firstSeen[card.id]) {
      showNew = true;
      firstSeen[card.id] = true;
    }
    var newTag = showNew ? '<span class="new-tag">新！</span>' : '';
    html += '<div class="card-item rarity-'+card.rarity+'"><div class="thumb"><img src="'+getImageUrl(card)+'" alt="'+card.name+'"></div><h4 class="card-name-'+card.rarity+'">'+card.name+'</h4><div class="stars" style="color:'+rarityColors[card.rarity]+'">'+'⭐'.repeat(card.rarity)+'</div>'+newTag+'</div>';
  }
  html += '</div>';
});
html += '</div>';
container.innerHTML = html;
container.classList.add('show');
renderMyCards();
}
