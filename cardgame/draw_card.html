<script>

// 打开/关闭概率预览弹窗
function closeProbabilityPopup() {
    document.getElementById('probabilityPopup').style.display = 'none';
}

// 概率预览计算（复用抽卡管理页面的算法，但使用当前配置）
async function previewProbability() {
    const poolNames = drawConfig.card_pool || [currentPool];
    const selectedTags = drawConfig.tag || [];
    const rarityWeights = drawConfig.rarity_weight || [50, 30, 15, 4, 1];
    const tagWeightMap = {};
    (drawConfig.tag_weight || []).forEach(tw => {
        const key = Object.keys(tw)[0];
        tagWeightMap[key] = tw[key];
    });
    
    // 加载卡池数据
    let allCards = [];
    for (const poolName of poolNames) {
        try {
            const res = await fetch('data/cards/' + poolName + '.json');
            const data = await res.json();
            allCards = allCards.concat(data.characters || []);
        } catch(e) { console.error('加载卡池失败:', poolName, e); }
    }
    
    // 过滤
    let filteredCards = allCards.filter(card => {
        const cardTags = card.tags || [];
        return selectedTags.length === 0 || cardTags.some(t => selectedTags.includes(t));
    });
    
    // 计算权重
    const remainingRarities = new Set();
    filteredCards.forEach(card => {
        const r = card.rarity || 1;
        if (r >= 1 && r <= rarityWeights.length) remainingRarities.add(r);
    });
    
    let totalWeightByRarity = {};
    for (let r = 1; r <= rarityWeights.length; r++) totalWeightByRarity[r] = 0;
    
    filteredCards.forEach(card => {
        const r = card.rarity || 1;
        if (!remainingRarities.has(r)) { card._finalWeight = 0; return; }
        const baseWeight = card.draw_weight || 100;
        let tagAdj = 0;
        (card.tags || []).forEach(t => { if (tagWeightMap[t] !== undefined) tagAdj += tagWeightMap[t]; });
        const finalWeight = Math.max(0, baseWeight + tagAdj);
        card._finalWeight = finalWeight;
        if (finalWeight > 0) totalWeightByRarity[r] += finalWeight;
    });
    
    // 计算概率
    const results = filteredCards.map(card => {
        const r = card.rarity || 1;
        const w = card._finalWeight || 0;
        const tw = totalWeightByRarity[r] || 1;
        const totalRarityW = rarityWeights.reduce((a,b) => a+b, 0);
        const rarityBase = (rarityWeights[r-1] || 0) / totalRarityW;
        const prob = rarityBase * (tw > 0 ? w/tw : 0) * 100;
        return { name: card.name, rarity: r, tags: (card.tags||[]).join(','), weight: w, probability: prob, isZero: w <= 0 };
    });
    
    results.sort((a, b) => b.probability - a.probability);
    
    // 渲染
    const container = document.getElementById('probabilityList');
    const rarityColors = ['', '#aaa', '#4caf50', '#2196f3', '#9c27b0', '#ff9800', '#f44336'];
    container.innerHTML = results.map(c => {
        const color = rarityColors[c.rarity] || '#aaa';
        return '<div class="prob-item' + (c.isZero ? ' zero-prob' : '') + '">' +
            '<span class="card-name" style="color:' + color + '">' + c.name + '</span>' +
            '<span class="card-rarity">' + '⭐'.repeat(c.rarity) + '</span>' +
            '<span class="card-tags">' + (c.tags || '-') + '</span>' +
            '<span class="card-weight">权重:' + c.weight + '</span>' +
            '<span class="card-prob">' + (c.isZero ? 0 : c.probability).toFixed(4) + '%</span></div>';
    }).join('');
    
    document.getElementById('probabilityPopup').style.display = 'flex';
}

    if (of) of.innerHTML = '<option value="">全部</option><option value="owned">有效权重</option><option value="zero">零权重</option>';
}

initPreviewFilters();

async function drawCard() {
if (isDrawing) return;
var cost = drawCost || 100;
if (myGold < cost) { alert('货币不足！'); return; }
isDrawing = true;

// 查询用户已有的card_id列表
ownedCardIds = {};
await fetch('game_api.php?action=get_owned_card_ids&user_id=' + userId).then(r => r.json()).then(d => {
    if (d.code === 200 && d.card_ids) d.card_ids.forEach(id => ownedCardIds[id] = true);

// 先刷新本地数据，确保一致性

function doDraw() {
    var config = drawConfig;
    var rarityWeights = config.rarity_weight || [];
    var selectedTags = config.tag || [];
    var tagWeightMap = {};
    (config.tag_weight || []).forEach(function(tw) {
        var key = Object.keys(tw)[0];
        var val = tw[key];
        tagWeightMap[key] = val;
    });
    
    var allCards = gameData.characters || [];
    
    // 1. Tag 过滤
    var filteredCards = allCards.filter(function(card) {
        var cardTags = card.tags || [];
        return selectedTags.length === 0 || cardTags.some(function(t) { return selectedTags.includes(t); });
    });
    
    // 动态从配置读取稀有度数量（使用权重数组长度作为真实来源）
    var rarityCount = Math.max(rarityWeights.length || 1, rarityConfig.length || 1);
    var totalRarityWeight = rarityWeights.reduce(function(a, b) { return a + b; }, 0);
    
    // 3. 确定稀有度
    var rand = Math.random() * totalRarityWeight;
    var selectedRarity = 1;
    var accumulated = 0;
    for (var r = 1; r <= rarityCount; r++) {
        accumulated += rarityWeights[r - 1] || 0;
        if (rand < accumulated) {
            selectedRarity = r;
            break;
        }
        selectedRarity = r;
    }
    
    // 5. 该稀有度内的卡牌，计算权重
    var rarityCards = filteredCards.filter(function(c) { return c.rarity === selectedRarity; });
    var totalWeight = 0;
    var cardWeights = [];
    
    rarityCards.forEach(function(card) {
        var baseWeight = card.draw_weight || 100;
        var tagAdjustment = 0;
        (card.tags || []).forEach(function(t) {
            if (tagWeightMap[t] !== undefined) {
                tagAdjustment += tagWeightMap[t];
            }
        });
        var finalWeight = Math.max(0, baseWeight + tagAdjustment);
        cardWeights.push({ card: card, weight: finalWeight });
        totalWeight += finalWeight;
    });
    
    // 6. 根据权重抽取
    if (totalWeight === 0 || rarityCards.length === 0) {
        // 如果没有有效卡，随机返回一个
        return filteredCards[Math.floor(Math.random() * filteredCards.length)] || allCards[0];
    }
    
    var drawRand = Math.random() * totalWeight;
    var accumulatedWeight = 0;
    for (var i = 0; i < cardWeights.length; i++) {
        accumulatedWeight += cardWeights[i].weight;
        if (drawRand <= accumulatedWeight) {
            return cardWeights[i].card;
        }
    }
    
    return cardWeights[cardWeights.length - 1].card;
}

function getStatColor(value, statName) {
var max = maxStats[statName];
var min = minStats[statName];
var range = max - min;
if (range === 0) return '#aaa';
var percent = (value - min) / range * 100;
if (percent >= 100) return '#ff0000';
if (percent >= 80) return '#ffd700';
if (percent >= 60) return '#9400d3';
if (percent >= 40) return '#4169e1';
if (percent >= 20) return '#00ff00';
return '#ffffff';
}

// 获取稀有度名称 - 优先从 rarityConfig 动态读取，否则使用 fallback
function getRarityName(rarity) {
    // 优先从动态配置获取
    if (rarityConfig && rarityConfig.length > 0) {
        var config = rarityConfig.find(function(c) { return c.rarity === rarity; });
        if (config) return config.name;
    }
    // Fallback: 构建动态 fallback 数组（支持任意稀有度数量）
    var fallbackNames = ['', '普通', '稀有', '杰出', '史诗', '传说', '远古'];
    // 动态扩展 fallback 数组以支持更多稀有度
    var extendedFallnames = ['', '普通', '稀有', '杰出', '史诗', '传说', '远古', '神话', '至尊', '王者', '天使', '恶魔'];
    if (rarity >= 1 && rarity < extendedFallnames.length) {
        return extendedFallnames[rarity];
    }
    return '稀有度' + rarity;
}

// 获取稀有度颜色 - 优先从 rarityConfig 动态读取，否则使用 fallback
function getRarityColor(rarity) {
    // 优先从动态配置获取
    if (rarityConfig && rarityConfig.length > 0) {
        var config = rarityConfig.find(function(c) { return c.rarity === rarity; });
        if (config) return config.color;
    }
    // Fallback: 动态颜色数组
    var fallbackColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800', '#f32b2b', '#00ffff', '#ff00ff', '#ffa500', '#fffacd', '#ff6347'];
    if (rarity >= 1 && rarity < fallbackColors.length) {
        return fallbackColors[rarity];
    }
    return '#fff';
}

// 获取稀有度名称
function getRarityNames(rarity) {

    var fallback = ['', '普通', '稀有', '杰出', '史诗', '传说', '远古'];

// 全局淡化颜色函数
function lightenColor(hex, factor) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    r = Math.round(r + (255 - r) * factor);
    g = Math.round(g + (255 - g) * factor);
    b = Math.round(b + (255 - b) * factor);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// 更新图鉴进度条
function updateAlbumProgress(allCards) {
    var container = document.getElementById('progressBars');
    var totalOwned = 0;
    var totalCards = 0;
    var allComplete = true;
    
    // 从 rarity_config.json 获取稀有度名称和颜色
    var rarityNames = [];
    var rarityColors = [];
    var maxRarity = rarityConfig.length;
    
    if (rarityConfig && rarityConfig.length > 0) {
        rarityConfig.forEach(function(cfg) {
            if (cfg.rarity >= 1 && cfg.rarity <= maxRarity) {
                rarityNames[cfg.rarity] = cfg.name;
                rarityColors[cfg.rarity] = cfg.color;
            }
        });
    }
    
    // Fallback if config not loaded yet
    if (rarityNames.length === 0) {
        rarityNames = ['', '普通', '稀有', '杰出', '史诗', '传说', '远古'];
        rarityColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800', '#f32b2b'];
    }
    
    // 生成淡化的背景色
    function lightenColor(hex, factor) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        r = Math.round(r + (255 - r) * factor);
        g = Math.round(g + (255 - g) * factor);
        b = Math.round(b + (255 - b) * factor);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
    }
    
    var html = '';
    for (var r = 1; r <= rarityConfig.length; r++) {
        var rCards = allCards.filter(function(c) { return c.rarity === r; });
        var rOwned = rCards.filter(function(c) { return myCards[c.id]; }).length;
        var rTotal = rCards.length;
        var rRate = rTotal > 0 ? (rOwned / rTotal * 100) : 0;
        
        totalOwned += rOwned;
        totalCards += rTotal;
        if (rRate < 100) allComplete = false;
        
        var isComplete = rRate >= 100;
        var rName = rarityNames[r] || '未知';
        var barColor = rarityColors[r] || '#fff';
        
        var rowStyle = '';
        var nameStyle = 'width:70px;font-size:12px;color:'+barColor+';';
        var textStyle = "width:90px;font-size:12px;text-align:right;color:" + barColor + ";";
        
        if (isComplete) {
            rowStyle = 'background:rgba(255,215,0,0.15);padding:5px;border-radius:5px;';
            nameStyle = 'width:70px;font-size:12px;color:'+barColor+';font-weight:bold;';
            textStyle = 'width:90px;font-size:12px;text-align:right;color:'+barColor+';font-weight:bold;';
        }
        
        // 进度条渐变背景和填充
        var barFillStyle = 'height:16px;border-radius:8px;transition:width 0.3s;position:relative;';
        var innerBar = '<div style="height:8px;background:'+barColor+';border-radius:4px;margin-top:4px;opacity:0.6;"></div>';
        var gradientFill = '';
        if (isComplete) {
            gradientFill = 'background:linear-gradient(180deg, '+barColor+' 0%, ' + lightenColor(barColor, 0.4) + ' 50%, '+barColor+' 100%);box-shadow:0 0 10px '+barColor+';';
        } else {
            gradientFill = 'background:linear-gradient(180deg, '+barColor+' 0%, ' + lightenColor(barColor, 0.3) + ' 100%);';
        }
        
        html += '<div style="display:flex;align-items:center;gap:10px;'+rowStyle+'">' +
            '<span style="'+nameStyle+'">' + r + '⭐ ' + rName + '</span>' +
            '<div style="flex:1;height:20px;background:#1a1a2e;border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);border:1px solid #333;">' +
                '<div style="width:'+rRate+'%;'+barFillStyle+gradientFill+'"></div>' +
            '</div>' +
            '<span style="'+textStyle+'">' + rOwned + '/' + rTotal + '</span>' +
        '</div>';
    }
    
    if (container) container.innerHTML = html;
    
    // 更新总达成率
    var overallRate = totalCards > 0 ? (totalOwned / totalCards * 100) : 0;
    var totalDisplay = document.getElementById('totalRateDisplay');
    if (totalDisplay) totalDisplay.textContent = overallRate.toFixed(0) + '%';
    
    if (allComplete && totalCards > 0) {
        if (totalDisplay) {
            totalDisplay.style.color = '#ffd700';
            totalDisplay.style.textShadow = '0 0 30px #ffd700, 0 0 60px #ffd700';
            totalDisplay.style.fontSize = '32px';
        }
        if (container) container.style.boxShadow = '0 0 30px rgba(255, 215, 0, 0.5), inset 0 0 20px rgba(255, 215, 0, 0.1)';
    } else {
        if (totalDisplay) {
            totalDisplay.style.color = '#4caf50';
            totalDisplay.style.textShadow = 'none';
            totalDisplay.style.fontSize = '24px';
        }
        if (container) container.style.boxShadow = 'none';
    }
    
    // 显示/隐藏进度条
    // document.getElementById('albumProgress').style.display = 'block'; // 已删除
}

var ctx = canvas.getContext('2d');
var w = canvas.width = canvas.offsetWidth;
var h = canvas.height = canvas.offsetHeight;
var cx = w / 2;
var cy = h / 2;
var r = Math.min(w, h) / 2 - 30;
var labels = ['HP', 'MP', '攻击', '防御', '敏捷'];
var stats = [
Math.round((card.baseStats || card.base_stats || {}).hp / maxStats.hp * 100),
Math.round((card.baseStats || card.base_stats || {}).mp / maxStats.mp * 100),
Math.round((card.baseStats || card.base_stats || {}).attack / maxStats.attack * 100),
Math.round((card.baseStats || card.base_stats || {}).defense / maxStats.defense * 100),
Math.round((card.baseStats || card.base_stats || {}).agility / maxStats.agility * 100)
];
var maxVal = 100;
var angleStep = (Math.PI * 2) / 5;
ctx.clearRect(0, 0, w, h);
// 画背景圆
for (var i = 1; i <= 5; i++) {
ctx.beginPath();
ctx.arc(cx, cy, r * i / 5, 0, Math.PI * 2);
ctx.strokeStyle = '#333';
ctx.stroke();
}
// 画轴线
for (var i = 0; i < 5; i++) {
ctx.beginPath();
ctx.moveTo(cx, cy);
ctx.lineTo(cx + Math.cos(i * angleStep - Math.PI/2) * r, cy + Math.sin(i * angleStep - Math.PI/2) * r);
ctx.strokeStyle = '#333';
ctx.stroke();
ctx.fillStyle = '#aaa';
ctx.font = '12px Arial';
ctx.textAlign = 'center';
ctx.fillText(labels[i], cx + Math.cos(i * angleStep - Math.PI/2) * (r + 20), cy + Math.sin(i * angleStep - Math.PI/2) * (r + 20));
}
// 画数据区域
ctx.beginPath();
for (var i = 0; i < 5; i++) {
var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
if (i === 0) ctx.moveTo(x, y);
else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
ctx.fill();
ctx.strokeStyle = '#e94560';
ctx.lineWidth = 2;
ctx.stroke();
// 画数据点
for (var i = 0; i < 5; i++) {
var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
ctx.beginPath();
ctx.arc(x, y, 5, 0, Math.PI * 2);
ctx.fillStyle = '#e94560';
ctx.fill();
}
}

var maxStats = {hp:0, mp:0, attack:0, defense:0, agility:0};
var minStats = {hp:Infinity, mp:Infinity, attack:Infinity, defense:Infinity, agility:Infinity};

function calcMaxStats() {
if (!gameData || !gameData.characters) return;
gameData.characters.forEach(function(c) {
    var stats = c.baseStats || c.base_stats || {};
    if (stats.hp > maxStats.hp) maxStats.hp = stats.hp;
    if (stats.hp < minStats.hp) minStats.hp = stats.hp;
    if (stats.mp > maxStats.mp) maxStats.mp = stats.mp;
    if (stats.mp < minStats.mp) minStats.mp = stats.mp;
    if (stats.attack > maxStats.attack) maxStats.attack = stats.attack;
    if (stats.attack < minStats.attack) minStats.attack = stats.attack;
    if (stats.defense > maxStats.defense) maxStats.defense = stats.defense;
    if (stats.defense < minStats.defense) minStats.defense = stats.defense;
    if (stats.agility > maxStats.agility) maxStats.agility = stats.agility;
    if (stats.agility < minStats.agility) minStats.agility = stats.agility;
});
if (minStats.hp === Infinity) minStats.hp = 0;
if (minStats.mp === Infinity) minStats.mp = 0;
if (minStats.attack === Infinity) minStats.attack = 0;
if (minStats.defense === Infinity) minStats.defense = 0;
if (minStats.agility === Infinity) minStats.agility = 0;
}

// 当前选中的配置ID
var currentConfigId = 1;

// 加载配置列表
function loadConfigList() {
    fetch('game_api.php?action=get_draw_configs').then(r => r.json()).then(d => {
        console.log('配置数据:', d);
        if (d.code === 200 && d.configs) {
            const select = document.getElementById('configSelect');
            select.innerHTML = '';
            d.configs.forEach(function(cfg) {
                const option = document.createElement('option');
                option.value = cfg.id;
                option.textContent = cfg.config_name + ' (消耗' + cfg.draw_cost + ' ' + cfg.currency_name + ')';
                select.appendChild(option);
            });
            // 默认选中第一个
            if (d.configs.length > 0) {
                select.value = currentConfigId;
            }
        }
    }).catch(e => console.error('加载配置列表失败:', e));
}

// 切换配置
function changeConfig(configId) {
    configId = parseInt(configId);
    if (!configId) return;
    
    console.log('切换配置:', configId);
    currentConfigId = configId;
    localStorage.setItem('drawConfigId', configId);
    
    // 先清空数据强制重新获取
    myGold = 0;
    document.getElementById('userBalance').textContent = '加载中...';
    
    // 重新加载数据
    loadConfigList();
    loadData();
}

function loadData() {
    // 获取用户ID
    userId = localStorage.getItem('user_id') || localStorage.getItem('userId');
    if (!userId) {
        window.location.href = 'login.html';
        return;
    }
    
    // 获取用户货币和抽卡配置（带config_id参数）
    Promise.all([
        fetch('game_api.php?action=get_user_currency&user_id=' + userId + '&config_id=' + currentConfigId).then(r => r.json()),
        fetch('game_api.php?action=get_config&config_id=' + currentConfigId).then(r => r.json())
    ]).then(([userData, configData]) => {
        // 设置用户货币
        if (userData.code === 200) {
            myGold = userData.gold || 0;
            console.log('货币数据:', userData);
        }
        
        // 设置货币名称和消耗（全局变量）
        currencyName = '元宝';
        drawCost = 100;
        if (configData.code === 200 && configData.config) {
            currencyName = configData.config.currency_name || '元宝';
            drawCost = configData.config.draw_cost || 100;
            currencyId = configData.config.currency_id || 1;
            // 设置drawConfig供概率预览使用
            drawConfig = {
                rarity_weight: configData.config.rarity_weight || [],
                tag: configData.config.tag || [],
                tag_weight: configData.config.tag_weight || [],
                card_pool: configData.config.card_pool || []
            };
        }
        
        // 更新显示
        try {
            var el = document.getElementById('userBalance');
            if (el) {
                el.textContent = '我的' + currencyName + ': ' + myGold;
                console.log('余额更新:', '我的' + currencyName + ': ' + myGold);
            } else {
                console.log('userBalance元素未找到');
            }
            var goldAmountEl = document.getElementById('goldAmount');
            var goldUnitEl = document.getElementById('goldUnit');
            if (goldAmountEl) goldAmountEl.textContent = myGold;
            if (goldUnitEl) goldUnitEl.textContent = currencyName;
        } catch(e) {
            console.error('更新余额失败:', e);
        }
        document.querySelectorAll('#currencyUnit').forEach(function(el) { el.textContent = currencyName; });
        document.getElementById('drawCost').textContent = drawCost;
        document.getElementById('drawCost10').textContent = Math.floor(drawCost * 10 * 0.9);
        
        // 更新抽卡消耗文字
        var costText = '消耗 ' + drawCost + ' ' + currencyName;
        var cost10Text = '消耗 ' + Math.floor(drawCost * 10 * 0.9) + ' ' + currencyName + ' (9折)';
    }).catch(e => console.error('加载失败:', e));
    // 加载稀有度配置
    fetch('data/sys_config/rarity_config.json').then(function(res) { return res.json(); }).then(function(config) {
        rarityConfig = config;
        populateRarityFilter();
    }).catch(function(e) {
        console.error('加载稀有度配置失败:', e);
        rarityConfig = [];
    });
    
    // 加载卡池数据 - 使用 get_all API 获取统一的卡牌数据
    fetch('game_api.php?action=get_all&user_id=' + userId).then(function(res) { return res.json(); }).then(function(data) {
        // get_all 返回包含 settings/rarity/config/characters，只取 characters
        gameData = data;
        allCharacters = data.characters || [];
        calcMaxStats();
        // 抽卡消耗已在loadData中更新
        renderMyCards();
        renderAlbum();
        // drawConfig 已在 loadData 中通过 get_config API 设置好了
    }).catch(function(e) { 
        console.error(e); 
    });
}
loadConfigList();

async function showResult10(cards) {
var container = document.getElementById('resultCard10');
var rarityColors = getRarityColorsFromConfig();
var rarityNames = getRarityNamesFromConfig();

function getRarityColorsFromConfig() {
    if (rarityConfig && rarityConfig.length > 0) {
        var colors = [''];
        rarityConfig.forEach(function(cfg) {
            colors[cfg.rarity] = cfg.color;
        });
        return colors;
    }
    return ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800', '#f32b2b'];
}

function getRarityNamesFromConfig() {
    if (rarityConfig && rarityConfig.length > 0) {
        var names = [''];
        rarityConfig.forEach(function(cfg) {
            names[cfg.rarity] = cfg.name;
        });
        return names;
    }
    return ['', '普通', '稀有', '杰出', '史诗', '传说', '远古'];
}

// Before updating, record which cards are newly obtained
var wasNewBefore = {};
cards.forEach(function(card) {
if (!ownedCardIds[card.id] && !wasNewBefore[card.id]) {
wasNewBefore[card.id] = true;
}
});

// Update counts and save to DB - 同步等待保存完成
for (var ci = 0; ci < cards.length; ci++) {
    var card = cards[ci];
    if (!myCards[card.id]) myCards[card.id] = JSON.parse(JSON.stringify(card));
    myCards[card.id].count = (myCards[card.id].count || 0) + 1;
    if (userId && card.id) {
        console.log('保存卡牌: userId=' + userId + ', card_id=' + card.id);
        await fetch('game_api.php?action=add_user_card&user_id=' + userId + '&card_id=' + card.id, {method: 'POST'});
    }
}

// Display: only first occurrence of each new card shows "新！"
var firstSeen = {};
var html = '<h3>🎉 十连抽结果</h3><div class="grid-10">';
// 2-3-3-2 layout
var layout = [2, 3, 3, 2];
var idx = 0;
layout.forEach(function(count, rowIdx) {
  html += '<div class="grid-row">';
  for (var i = 0; i < count && idx < cards.length; i++) {
    var card = cards[idx++];
    var showNew = false;
    if (wasNewBefore[card.id] && !firstSeen[card.id]) {
      showNew = true;
      firstSeen[card.id] = true;
    }
    var newTag = showNew ? '<span class="new-tag">新！</span>' : '';
    html += '<div class="card-item rarity-'+card.rarity+'"><div class="thumb"><img src="'+getImageUrl(card)+'" alt="'+card.name+'"></div><h4 class="card-name-'+card.rarity+'">'+card.name+'</h4><div class="stars" style="color:'+rarityColors[card.rarity]+'">'+'⭐'.repeat(card.rarity)+'</div>'+newTag+'</div>';
  }
  html += '</div>';
});
html += '</div>';
container.innerHTML = html;
container.classList.add('show');
renderMyCards();
}
