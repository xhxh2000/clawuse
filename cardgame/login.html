<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 卡牌游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #0f3460;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
        }
        .tab.active {
            background: #e94560;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff5070, #e94560);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff6b7a;
        }
        .message.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #7fff7f;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        .link a {
            color: #e94560;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            color: #aaa;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 卡牌游戏</h1>
        
        <div id="message" class="message"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')" id="tab-login">登录</div>
            <div class="tab" onclick="switchTab('register')" id="tab-register">注册</div>
        </div>
        
        <div id="form-login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="doLogin()">登录</button>
        </div>
        
        <div id="form-register" style="display:none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="reg-username" placeholder="2-20字符">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="reg-password" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="reg-password2" placeholder="再次输入密码">
            </div>
            <button class="btn btn-primary" onclick="doRegister()">注册</button>
        </div>
        
        <div id="loading" class="loading">处理中...</div>
        
        <div class="link">
            <a href="index.html">返回主页</a>
        </div>
    </div>
    
    <script>
        let currentTab = 'login';
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
            document.getElementById('tab-register').className = 'tab' + (tab === 'register' ? ' active' : '');
            document.getElementById('message').style.display = 'none';
        }
        
        function showMessage(msg, isError) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + (isError ? 'error' : 'success');
            el.style.display = 'block';
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                showMessage('请输入用户名和密码', true);
                return;
            }
            
            showLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('auth.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.code === 200) {
                    showMessage('登录成功！', false);
                    // 保存登录信息
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('gold', result.gold);
                    localStorage.setItem('level', result.level);
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('member', JSON.stringify(result.member));
                    // 简单token
                    const token = btoa(result.user_id + '.' + result.username);
                    localStorage.setItem('token', token);
                    // 跳转
                    setTimeout(() => {
                        const target = result.role === 'admin' ? 'index.html' : 'draw_card.html';
                        window.location.href = target;
                    }, 1000);
                } else {
                    showMessage(result.msg, true);
                }
            } catch (e) {
                showMessage('网络错误: ' + e.message, true);
            }
            
            showLoading(false);
        }
        
        async function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            
            if (!username || !password) {
                showMessage('请填写完整', true);
                return;
            }
            if (password !== password2) {
                showMessage('两次密码不一致', true);
                return;
            }
            if (password.length < 6) {
                showMessage('密码至少6位', true);
                return;
            }
            
            showLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('auth.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.code === 200) {
                    showMessage('注册成功！自动登录中...', false);
                    // 自动登录
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('gold', result.gold);
                    localStorage.setItem('level', result.level);
                    localStorage.setItem('role', result.role);
                    const token = btoa(result.user_id + '.' + result.username);
                    localStorage.setItem('token', token);
                    setTimeout(() => {
                        const target = result.role === 'admin' ? 'index.html' : 'draw_card.html';
                        window.location.href = target;
                    }, 1500);
                } else {
                    showMessage(result.msg, true);
                }
            } catch (e) {
                showMessage('网络错误: ' + e.message, true);
            }
            
            showLoading(false);
        }
        
        // 回车登录
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
