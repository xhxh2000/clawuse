<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: transparent; padding: 20px; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #e94560; }
        .header-controls { display: flex; align-items: center; gap: 10px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .panel { background: transparent; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .panel h2 { color: #e94560; margin-bottom: 15px; }
        .panel h3 { color: #e94560; margin: 15px 0 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: #e94560; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-small { padding: 5px 10px; font-size: 12px; }
        
        /* 视图切换按钮 */
        .view-toggle { display: flex; gap: 5px; }
        .view-toggle button { padding: 8px 15px; background: #0f3460; color: #aaa; border: none; border-radius: 5px; cursor: pointer; }
        .view-toggle button.active { background: #e94560; color: white; }
        
        /* 卡片视图 */
        .card-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card-item { background: #0f3460; border-radius: 10px; padding: 15px; cursor: pointer; }
        .card-item.rarity-1 { background: #2a2a2a; }
        .card-item.rarity-2 { background: #1a3a1a; }
        .card-item.rarity-3 { background: #1a1a3a; }
        .card-item.rarity-4 { background: #2a1a3a; }
        .card-item.rarity-5 { background: #3a2a1a; }
        .card-item:hover { background: #1a4a7a; }
        .card-item.rarity-1:hover { background: #3a3a3a; }
        .card-item.rarity-2:hover { background: #2a4a2a; }
        .card-item.rarity-3:hover { background: #2a2a4a; }
        .card-item.rarity-4:hover { background: #3a2a4a; }
        .card-item.rarity-6 { background: #3a1a1a; }
        .card-item.rarity-5:hover { background: #4a3a2a; }
        .card-item:hover { background: #1a4a7a; }
        .card-item h3 { margin: 10px 0 5px; }
        .card-item .rarity { color: #aaa; }
        /* 稀有度颜色 */
        .rarity-1 { color: #ffffff; }
        .rarity-2 { color: #4caf50; }
        .rarity-3 { color: #2196f3; }
        .rarity-4 { color: #9c27b0; }
        .rarity-5 { color: #ff9800; }
        .card-name-1 { color: #ffffff; }
        .card-name-2 { color: #4caf50; }
        .card-name-3 { color: #2196f3; }
        .card-name-4 { color: #9c27b0; }
        .card-name-5 { color: #ff9800; font-weight: bold; }
        .card-item .actions { margin-top: 10px; display: flex; gap: 5px; }
        
        /* 列表视图 */
        .table-container { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; }
        .data-table th { background: #0f3460; cursor: pointer; user-select: none; }
        .data-table th:hover { background: #1a4a7a; }
        .data-table th.sorted-asc::after { content: ' ▲'; }
        .data-table th.sorted-desc::after { content: ' ▼'; }
        .data-table tr { cursor: pointer; }
        .data-table tr:hover { background: #0f3460; }
        .data-table .actions-cell { cursor: default; }
        .data-table .actions-cell:hover { background: transparent; }
        
        /* 分页 */
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 10px; }
        .pagination-info { color: #aaa; }
        .pagination-controls { display: flex; gap: 5px; }
        .pagination-controls button { padding: 8px 12px; background: #0f3460; color: #eee; border: none; border-radius: 5px; cursor: pointer; }
        .pagination-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-controls button.active { background: #e94560; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        /* 弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal.show { display: flex; justify-content: center; padding: 20px; }
        .modal-content { background: #16213e; border-radius: 10px; padding: 30px; max-width: 750px; width: 100%; max-height: 90vh; overflow-y: auto; }
        
        /* 卡片详情弹窗 */
        #cardDetailPopup { max-width: 800px; }
        .popup-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .popup-image { flex: 0 0 250px; max-height: 350px; overflow: hidden; display: flex; background: #16213e; align-items: center; justify-content: center; }
        .popup-image img { max-width: 100%; max-height: 350px; width: auto; height: auto; object-fit: contain; border-radius: 10px; }
        .popup-info { flex: 1; min-width: 280px; }
        .popup-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .popup-rarity { font-size: 18px; margin-bottom: 10px; }
        .popup-desc { color: #aaa; margin-bottom: 15px; line-height: 1.5; }
        .popup-stats { margin-top: 20px; }
        .popup-stats h4 { color: #e94560; margin-bottom: 10px; }
        .stats-grid-2 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; text-align: center; }
        .stat-row { background: #0f3460; padding: 10px; border-radius: 5px; }
        .stat-label { display: block; color: #aaa; font-size: 12px; margin-bottom: 5px; }
        .stat-value { display: block; font-size: 18px; font-weight: bold; }
        .stat-value.growth { color: #ffd700 !important; font-size: 16px; }
        .popup-radar { margin-top: 20px; }
        .popup-radar canvas { width: 100%; max-width: 300px; height: 300px; margin: 0 auto; display: block; }
        .close-popup { position: absolute; top: 20px; right: 20px; background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        /* 过滤区域 */
        .filter-panel { background: #0f3460; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .filter-panel h4 { color: #e94560; margin-bottom: 10px; font-size: 14px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { color: #aaa; font-size: 12px; }
        .filter-item input, .filter-item select { padding: 6px 10px; background: #1a1a2e; color: #eee; border: 1px solid #16213e; border-radius: 4px; font-size: 12px; }
        .filter-item input[type="number"] { width: 80px; }
        .filter-item select { min-width: 100px; }
        .filter-item-name input { width: 150px; }
        .filter-actions { display: flex; gap: 10px; align-items: flex-end; }
        .filter-actions button { padding: 6px 15px; font-size: 12px; }
        .btn-reset { background: #666; color: white; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body >
    <div class="header">
        <h1>🎮 卡牌管理</h1>
    </div>
    <div class="container">
        <div class="panel">
            <h2>🃏 卡牌列表</h2>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="view-toggle">
                        <button id="btnCardView" onclick="switchView('card')">卡片视图</button>
                        <button id="btnListView" class="active" onclick="switchView('list')">列表视图</button>
                    </div>
                    <button class="btn btn-primary" onclick="showAddModal()">+ 添加新卡牌</button>
                </div>
            </div>
            <div id="displayModeContainer">
                <label>显示内容：</label>
                <select id="cardDisplayMode" onchange="renderCards()" style="padding:6px;background:#0f3460;color:#eee;border:1px solid #0f3460;border-radius:5px;">
                    <option value="desc">描述</option>
                    <option value="image">图片</option>
                </select>
            </div>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <label>卡池：</label>
                <select id="poolSelect" onchange="changePool(this.value)" style="padding: 8px; background: #0f3460; color: #eee; border: 1px solid #0f3460; border-radius: 5px;">
                <option value="NIKKE" selected>NIKKE</option>
                </select>
            </div>
            <!-- 稀有度饼图 -->
            <div id="rarityChartContainer" style="display:flex;align-items:center;gap:20px;margin-bottom:15px;padding:10px;background:#0f3460;border-radius:8px;">
                <canvas id="rarityPieChart" width="100" height="100" style="flex-shrink:0;"></canvas>
                <div id="rarityLegend" style="font-size:12px;"></div>
            </div>
            
            <!-- 过滤面板 -->
            <div class="filter-panel">
                <h4>🔍 筛选条件</h4>
                <div class="filter-row">
                    <div class="filter-item">
                        <label>卡池</label>
                        <select id="filterPool" onchange="applyFilter()">
                            <option value="">ALL</option>
                        </select>
                    </div>
                    <div class="filter-item filter-item-name">
                        <label>名字</label>
                        <input type="text" id="filterName" placeholder="模糊搜索..." oninput="applyFilter()">
                    </div>
                    <div class="filter-item filter-item-name">
                        <label>标签</label>
                        <input type="text" id="filterTag" placeholder="标签..." oninput="applyFilter()">
                    </div>
                    <div class="filter-item">
                        <label>稀有度</label>
                        <select id="filterRarity" onchange="applyFilter()">
                        </select>
                    </div>
                </div>
                <div class="filter-row" style="margin-top:10px;">
                    <div class="filter-item">
                        <label>属性</label>
                        <select id="filterStat" onchange="applyFilter()">
                            <option value="">--</option>
                            <option value="HP">HP(基础)</option>
                            <option value="ATK">ATK(基础)</option>
                            <option value="DEF">DEF(基础)</option>
                            <option value="SKL">SKL(基础)</option>
                            <option value="SPD">SPD(基础)</option>
                            <option value="g_HP">HP(成长)</option>
                            <option value="g_ATK">ATK(成长)</option>
                            <option value="g_DEF">DEF(成长)</option>
                            <option value="g_SKL">SKL(成长)</option>
                            <option value="g_SPD">SPD(成长)</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>运算</label>
                        <select id="filterOp" onchange="applyFilter()" style="width:60px;">
                            <option value="">=</option>
                            <option value=">=">≥</option>
                            <option value="<=">≤</option>
                            <option value=">">></option>
                            <option value="<"><</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>数值</label>
                        <input type="number" id="filterValue" placeholder="值" oninput="applyFilter()" style="width:80px;">
                    </div>
                </div>
            </div>
            
            <!-- 卡片视图 -->
            <div id="cardView">
                <div class="card-list" id="cardList"></div>
            </div>
            
            <!-- 列表视图 -->
            <div id="listView" class="hidden">
                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                    <label>每页显示：</label>
                    <select id="pageSize" onchange="changePageSize()">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="table-container">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th onclick="sortTable('name')">名字</th>
                                <th onclick="sortTable('rarity')">稀有度</th>
                                <th onclick="sortTable('HP')">HP</th>
                                <th onclick="sortTable('g_HP')">成长HP</th>
                                <th onclick="sortTable('ATK')">ATK</th>
                                <th onclick="sortTable('g_ATK')">成长ATK</th>
                                <th onclick="sortTable('DEF')">DEF</th>
                                <th onclick="sortTable('g_DEF')">成长DEF</th>
                                <th onclick="sortTable('SKL')">SKL</th>
                                <th onclick="sortTable('g_SKL')">成长SKL</th>
                                <th onclick="sortTable('SPD')">SPD</th>
                                <th onclick="sortTable('g_SPD')">成长SPD</th>
                                <th onclick="sortTable('draw_weight')">权重</th>
                                <th>标签</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
    
    <!-- 编辑弹窗 -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <h2 id="modalTitle">添加新卡牌</h2>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                <div class="form-group">
                    <label>卡牌名称</label>
                    <input type="text" id="cardName" required>
                </div>
                <div class="form-group">
                    <label>稀有度</label>
                    <select id="cardRarity"></select>
                </div>
                <div class="form-group">
                    <label>卡牌图像 URL</label>
                    <input type="text" id="cardImage" placeholder="可选">
                </div>
                <div class="form-group">
                    <label>卡牌描述</label>
                    <input type="text" id="cardDesc">
                </div>
                <div class="form-group">
                    <label>标签（多个用逗号分隔）</label>
                    <input type="text" id="cardTags" placeholder="例如: NIKKE,寄叶部队">
                </div>
                <div class="form-group">
                    <label>抽卡权重</label>
                    <input type="number" id="cardDrawWeight" value="100">
                </div>
                <h3>基础属性</h3>
                <div class="stats-grid">
                    <div class="form-group"><label>HP</label><input type="text" id="baseHp" value="0"></div>
                    <div class="form-group"><label>ATK</label><input type="number" id="baseAttack" value="0"></div>
                    <div class="form-group"><label>DEF</label><input type="number" id="baseDefense" value="0"></div>
                    <div class="form-group"><label>SKL</label><input type="text" id="baseSkl" value="0"></div>
                    <div class="form-group"><label>SPD</label><input type="text" id="baseSpd" value="0"></div>
                </div>
                <h3>成长属性</h3>
                <div class="stats-grid">
                    <div class="form-group"><label>HP</label><input type="text" id="growthHp" value="0" step="0.1"></div>
                    <div class="form-group"><label>ATK</label><input type="text" id="growthAtk" value="0" step="0.1"></div>
                    <div class="form-group"><label>DEF</label><input type="text" id="growthDef" value="0" step="0.1"></div>
                    <div class="form-group"><label>SKL</label><input type="text" id="growthSkl" value="0" step="0.1"></div>
                    <div class="form-group"><label>SPD</label><input type="text" id="growthSpd" value="0" step="0.1"></div>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-success">保存</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">取消</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 卡片详情弹窗 -->
    <div class="modal" id="cardDetailPopup">
        <div class="modal-content" style="position: relative;">
            <button class="close-popup" onclick="closeDetailPopup()">关闭</button>
            <div class="popup-container">
                <div class="popup-image">
                    <img id="detailImage" src="" alt="" style="cursor:pointer;" onclick="showFullImage(this.src)">
                </div>
                <div class="popup-info">
                    <div id="detailName" class="popup-name"></div>
                    <div id="detailRarity" class="popup-rarity"></div>
                    <div id="detailDesc" class="popup-desc"></div>
                    <div id="detailTags" style="margin: 15px 0; color: #aaa;"></div>
                    <div id="detailWeight" style="margin: 15px 0; color: #e94560; font-weight: bold;"></div>
                    <div class="popup-stats">
                        <h4>📊 基础属性</h4>
                        <div id="detailStats" class="stats-grid-2"></div>
                    </div>
                    <div class="popup-stats">
                        <h4>📈 成长数据</h4>
                        <div id="detailGrowth" class="stats-grid-2"></div>
                    </div>
                    <div class="popup-radar">
                        <canvas id="radarCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 原图弹窗 -->
    <div class="modal" id="fullImagePopup" onclick="if(event.target === this) closeFullImage()" style="cursor:pointer;">
        <div style="max-width:90%;max-height:90%;">
            <img id="fullImage" src="" style="max-width:100%;max-height:90vh;object-fit:contain;">
        </div>
    </div>
    
    <script>
        let gameData = { settings: {}, characters: [], rarityWeights: {} };
let rarityConfig = [];
        let currentView = 'list';
        let currentPool = 'NIKKE';
        let poolList = [];
        let filteredCharacters = [];
        
        // 过滤状态
        let filterState = {
            pool: '',
            name: '',
            rarity: '',
            stat: '',
            op: '',
            value: '',
            tag: ''
        };
        
        function changePool(pool) {
            currentPool = pool;
            resetFilter();
            loadData();
        }
        
        // 过滤函数
        function applyFilter() {
            filterState.pool = document.getElementById('filterPool').value;
            filterState.name = document.getElementById('filterName').value.trim().toLowerCase();
            filterState.rarity = document.getElementById('filterRarity').value;
            filterState.stat = document.getElementById('filterStat').value;
            filterState.op = document.getElementById('filterOp').value;
            filterState.value = document.getElementById('filterValue').value;
            filterState.tag = document.getElementById('filterTag').value.trim().toLowerCase();
            
            filteredCharacters = gameData.characters.filter(card => {
                if (filterState.name && !card.name.toLowerCase().includes(filterState.name)) return false;
                if (filterState.pool && card.pool_name !== filterState.pool) return false;
                if (filterState.rarity && card.rarity !== parseInt(filterState.rarity)) return false;
                if (filterState.stat && filterState.value) {
                    let statValue;
                    if (filterState.stat.startsWith('g_')) {
                        statValue = card.growthStats ? card.growthStats[filterState.stat.replace('g_', '')] : 0;
                    } else {
                        statValue = card.baseStats[filterState.stat];
                    }
                    if (!filterByStat(statValue, { op: filterState.op, value: filterState.value })) return false;
                }
                if (filterState.tag) {
                    const cardTags = card.tags || [];
                    if (!cardTags.some(t => t.toLowerCase().includes(filterState.tag))) return false;
                }
                return true;
            });
            
            currentPage = 1;
            renderCards();
            renderListView();
        }
        
        function filterByStat(cardValue, filter) {
            if (!filter.op || !filter.value) return true;
            const filterValue = parseInt(filter.value);
            if (isNaN(filterValue)) return true;
            if (filter.op === '=') return cardValue === filterValue;
            if (filter.op === '>=') return cardValue >= filterValue;
            if (filter.op === '<=') return cardValue <= filterValue;
            return true;
        }
        
        function resetFilter() {
            document.getElementById('filterName').value = '';
            document.getElementById('filterRarity').value = '';
            document.getElementById('filterStat').value = '';
            document.getElementById('filterOp').value = '';
            document.getElementById('filterValue').value = '';
            document.getElementById('filterTag').value = '';
            
            filterState = {
                name: '', rarity: '', stat: '', op: '', value: '', tag: ''
            };
            filteredCharacters = [...gameData.characters];
            currentPage = 1;
            renderCards();
            renderListView();
        }
        
        function getDisplayCharacters() {
            const hasFilter = filterState.name || filterState.rarity || 
                (filterState.stat && filterState.value) || 
                filterState.tag ||
                filterState.pool;
            return hasFilter ? filteredCharacters : gameData.characters;
        }
        
        let sortColumn = 'name';
        let sortDirection = 'asc';
        let currentPage = 1;
        let pageSize = 25;
        
        // 稀有度名称 - 从配置动态获取
        function getRarityName(rarity) {
            if (rarityConfig && rarityConfig.length > 0) {
                const cfg = rarityConfig.find(function(x) { return x.rarity === rarity; });
                if (cfg) return cfg.name;
            }
            return getRarityName(rarity);
        }
        
        // 稀有度颜色 - 从配置动态获取
        function getRarityColor(rarity) {
            if (rarityConfig && rarityConfig.length > 0) {
                const cfg = rarityConfig.find(function(x) { return x.rarity === rarity; });
                if (cfg) return cfg.color;
            }
            return rarityColors[rarity] || '#fff';
        }
        
        // 稀有度名称（备用默认值）
        const rarityNames = ['', '普通', '稀有', '杰出', '史诗', '传说'];
        
        // 稀有度颜色（备用默认值）
        const rarityColors = ['', '#ffffff', '#4caf50', '#2196f3', '#9c27b0', '#ff9800'];
        
        // 最大属性值（用于计算百分比）
        const maxStats = { HP: 0, ATK: 0, DEF: 0, SKL: 0, SPD: 0 };
        const minStats = { HP: Infinity, ATK: Infinity, DEF: Infinity, SKL: Infinity, SPD: Infinity };
        const maxGrowthStats = { HP: 0, ATK: 0, DEF: 0, SKL: 0, SPD: 0 };
        const minGrowthStats = { HP: Infinity, ATK: Infinity, DEF: Infinity, SKL: Infinity, SPD: Infinity };
        
        // 动态计算成长最大值和最小值
        function calcMaxGrowthStats() { console.log('calcMaxGrowthStats called, maxGrowthStats:', maxGrowthStats);
            if (!gameData || !gameData.characters) return;
            gameData.characters.forEach(function(c) {
                if (c.growthStats) {
                    if (c.growthStats.HP > maxGrowthStats.HP) maxGrowthStats.HP = c.growthStats.HP;
                    if (c.growthStats.HP < minGrowthStats.HP) minGrowthStats.HP = c.growthStats.HP;
                    if (c.growthStats.ATK > maxGrowthStats.ATK) maxGrowthStats.ATK = c.growthStats.ATK;
                    if (c.growthStats.ATK < minGrowthStats.ATK) minGrowthStats.ATK = c.growthStats.ATK;
                    if (c.growthStats.DEF > maxGrowthStats.DEF) maxGrowthStats.DEF = c.growthStats.DEF;
                    if (c.growthStats.DEF < minGrowthStats.DEF) minGrowthStats.DEF = c.growthStats.DEF;
                    if (c.growthStats.SKL > maxGrowthStats.SKL) maxGrowthStats.SKL = c.growthStats.SKL;
                    if (c.growthStats.SKL < minGrowthStats.SKL) minGrowthStats.SKL = c.growthStats.SKL;
                    if (c.growthStats.SPD > maxGrowthStats.SPD) maxGrowthStats.SPD = c.growthStats.SPD;
                    if (c.growthStats.SPD < minGrowthStats.SPD) minGrowthStats.SPD = c.growthStats.SPD;
                }
            });
        }
        
        // 动态计算最大和最小属性值
        function calcMaxStats() {
            if (!gameData || !gameData.characters) return;
            gameData.characters.forEach(function(c) {
                if (c.baseStats.HP > maxStats.HP) maxStats.HP = c.baseStats.HP;
                if (c.baseStats.HP < minStats.HP) minStats.HP = c.baseStats.HP;
                // mp 已删除
                if (c.baseStats.ATK > maxStats.ATK) maxStats.ATK = c.baseStats.ATK;
                if (c.baseStats.ATK < minStats.ATK) minStats.ATK = c.baseStats.ATK;
                if (c.baseStats.DEF > maxStats.DEF) maxStats.DEF = c.baseStats.DEF;
                if (c.baseStats.DEF < minStats.DEF) minStats.DEF = c.baseStats.DEF;
                if (c.baseStats.SKL > maxStats.SKL) maxStats.SKL = c.baseStats.SKL;
                if (c.baseStats.SKL < minStats.SKL) minStats.SKL = c.baseStats.SKL;
                if (c.baseStats.SPD > maxStats.SPD) maxStats.SPD = c.baseStats.SPD;
                if (c.baseStats.SPD < minStats.SPD) minStats.SPD = c.baseStats.SPD;
            });
            // 确保最小值不为无穷大
            if (minStats.HP === Infinity) minStats.HP = 0;
            if (minStats.ATK === Infinity) minStats.ATK = 0;
            if (minStats.DEF === Infinity) minStats.DEF = 0;
            if (minStats.SKL === Infinity) minStats.SKL = 0;
            if (minStats.SPD === Infinity) minStats.SPD = 0;
        }

        // 绘制稀有度饼图
        function drawRarityPieChart() {
            if (!gameData || !gameData.characters) return;
            
            const canvas = document.getElementById('rarityPieChart');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 2 - 10;
            
            // 统计每个稀有度的数量
            const rarityCounts = {};
            gameData.characters.forEach(function(c) {
                const r = c.rarity || 1;
                rarityCounts[r] = (rarityCounts[r] || 0) + 1;
            });
            
            // 获取存在的稀有度
            const existingRarities = Object.keys(rarityCounts).map(Number).sort(function(a,b){return a-b});
            const total = gameData.characters.length;
            
            // 清空
            ctx.clearRect(0, 0, width, height);
            
            // 绘制饼图
            let startAngle = 0;
            existingRarities.forEach(function(r) {
                const count = rarityCounts[r];
                const sliceAngle = (count / total) * 2 * Math.PI;
                var color = '#666';
                if (rarityConfig && rarityConfig.length > 0) {
                    var cfg = rarityConfig.find(function(x) { return x.rarity === r; });
                    if (cfg) color = cfg.color;
                } else {
                    color = rarityColors[r] || '#666';
                }
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = color || '#666';
                ctx.fill();
                
                startAngle += sliceAngle;
            });
            
            // 绘制图例
            const legend = document.getElementById('rarityLegend');
            legend.innerHTML = existingRarities.map(function(r) {
                const count = rarityCounts[r];
                const pct = ((count / total) * 100).toFixed(1);
                var color = '#666';
                var name = r;
                if (rarityConfig && rarityConfig.length > 0) {
                    var cfg = rarityConfig.find(function(x) { return x.rarity === r; });
                    if (cfg) { color = cfg.color; name = cfg.name; }
                } else {
                    color = rarityColors[r] || '#666';
                    name = getRarityName(r);
                }
                return '<div style="display:flex;align-items:center;gap:5px;margin:3px 0;"><span style="width:12px;height:12px;background:'+color+';display:inline-block;"></span> ' + name + ': ' + count + '张 (' + pct + '%)</div>';
            }).join('');
        }
        
        // 获取属性颜色（基于动态范围）
        function getStatColor(value, statName) {
            const max = maxStats[statName];
            const min = minStats[statName];
            const range = max - min;
            if (range === 0) return '#aaa';
            const percent = (value - min) / range * 100;
            if (percent >= 100) return '#ff0000';
            if (percent >= 80) return '#ffd700';
            if (percent >= 60) return '#9400d3';
            if (percent >= 40) return '#4169e1';
            if (percent >= 20) return '#00ff00';
            if (percent >= 0) return '#ffffff';
            return '#aaa';
        }
        
        // 获取成长属性颜色 - 用实际最小值和最大值计算
        function getGrowthColor(value, statName, maxStatsg) {
            if (!value || value <= 0) return '#ffffff';  // 无数据或0显示白色
            
            // 获取该属性的最大值和最小值
            let maxVal, minVal;
            if (statName) {
                maxVal = maxStatsg ? maxStatsg[statName] : maxGrowthStats[statName];
                minVal = minGrowthStats[statName];
                // 如果 minVal 是 Infinity，用 0 代替
                if (minVal === Infinity) minVal = 0;
            } else {
                maxVal = Math.max(...Object.values(maxGrowthStats));
                minVal = 0;
            }
            
            if (!maxVal || maxVal === 0) return '#aaa';
            const range = maxVal - minVal;
            if (range === 0) return '#aaa';
            
            const percent = (value - minVal) / range * 100;
            
            if (percent >= 100) return '#ff0000';  // 100% 红色
            if (percent >= 80) return '#ffd700'; // 80%-100% 金色
            if (percent >= 60) return '#9400d3'; // 60%-80% 紫色
            if (percent >= 40) return '#4169e1'; // 40%-60% 蓝色
            if (percent >= 20) return '#00ff00'; // 20%-40% 绿色
            return '#ffffff'; // 20% 及以下白色
        }
        
        // 获取图片URL
        function getImageUrl(card) {
            if (card.image) return card.image;
            return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300"><rect fill="#0f3460" width="200" height="300"/><text fill="#fff" font-size="30" x="50%" y="50%" text-anchor="middle" dy=".3em">'+card.name+'</text></svg>');
        }
        
        // 绘制雷达图
        function drawRadar(card) {
            var canvas = document.getElementById('radarCanvas');
            var ctx = canvas.getContext('2d');
            var w = canvas.width = canvas.offsetWidth;
            var h = canvas.height = canvas.offsetHeight;
            var cx = w / 2;
            var cy = h / 2;
            var r = Math.min(w, h) / 2 - 30;
            var labels = ['HP', 'ATK', 'DEF', 'SKL', 'SPD'];
            var stats = [
                Math.round(card.baseStats.HP / maxStats.HP * 100),
                Math.round(card.baseStats.ATK / maxStats.ATK * 100),
                Math.round(card.baseStats.DEF / maxStats.DEF * 100),
                Math.round(card.baseStats.SKL / maxStats.SKL * 100),
                Math.round(card.baseStats.SPD / maxStats.SPD * 100)
            ];
            var maxVal = 100;
            var angleStep = (Math.PI * 2) / 5;
            
            ctx.clearRect(0, 0, w, h);
            
            // 画背景圆
            for (var i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * i / 5, 0, Math.PI * 2);
                ctx.strokeStyle = '#333';
                ctx.stroke();
            }
            
            // 画轴线
            for (var i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(i * angleStep - Math.PI/2) * r, cy + Math.sin(i * angleStep - Math.PI/2) * r);
                ctx.strokeStyle = '#333';
                ctx.stroke();
                
                // 标签
                ctx.fillStyle = '#aaa';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], cx + Math.cos(i * angleStep - Math.PI/2) * (r + 20), cy + Math.sin(i * angleStep - Math.PI/2) * (r + 20));
            }
            
            // 画数据区域
            ctx.beginPath();
            for (var i = 0; i < 5; i++) {
                var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
                var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 画数据点
            for (var i = 0; i < 5; i++) {
                var x = cx + Math.cos(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
                var y = cy + Math.sin(i * angleStep - Math.PI/2) * (r * stats[i] / maxVal);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#e94560';
                ctx.fill();
            }
        }

        async function loadData() {
            // 获取卡池列表
            try {
                const poolsRes = await fetch('game_api.php?action=get_pools');
                const poolsData = await poolsRes.json();
                if (poolsData.code === 200 && poolsData.pools) {
                    poolList = poolsData.pools;
                }
                const select = document.getElementById('poolSelect');
                if (select) {
                    select.innerHTML = poolList.map(p => 
                        '<option value="'+p+'" '+(p===currentPool?'selected':'')+'>'+p+'</option>'
                    ).join('');
                }
                // 填充筛选框的卡池下拉
                const filterPool = document.getElementById('filterPool');
                if (filterPool) {
                    filterPool.innerHTML = '<option value="">ALL</option>' + poolList.map(p => 
                        '<option value="'+p+'">'+p+'</option>'
                    ).join('');
                }
            } catch(e) { console.error('获取卡池列表失败:', e); }
            // 加载稀有度配置
            try {
                const rarityRes = await fetch('game_api.php?action=get_rarity');
                const r = await rarityRes.json();
                if (r.code === 200) {
                    rarityConfig = r.rarity || [];
                    renderRaritySelect();
                    renderFilterRaritySelect();
                }
            } catch(e) { console.error('加载稀有度配置失败:', e); rarityConfig = []; }
            // 从数据库加载卡牌
            try {
                const res = await fetch('game_api.php?action=get_cards');
                const r = await res.json();
                if (r.code === 200) {
                    gameData = { settings: {}, characters: r.characters || [], rarityWeights: {} };
                    renderCards(); renderListView(); calcMaxStats(); calcMaxGrowthStats(); switchView('list'); drawRarityPieChart();
                }
            } catch(e) { console.error('加载失败:', e); }
        }

                    '<td class="growth" style="color:'+(c.growthStats ? getGrowthColor(c.growthStats.SPD, 'SPD') : '#666')+'">'+(c.growthStats ? c.growthStats.SPD + '+' : '-')+'</td>' +
                    '<td>'+(c.draw_weight || 100)+'</td>' +
                    '<td style="font-size:11px;color:#aaa;">'+(c.tags ? c.tags.join('<br>') : '-')+'</td>' +
                    '<td class="actions-cell" onclick="event.stopPropagation()">' +
                        '<button class="btn btn-primary btn-small" onclick="editCard('+c.id+')">编辑</button>' +
                        '<button class="btn btn-danger btn-small" onclick="deleteCard('+c.id+')">删除</button>' +
                    '</td>' +
                '</tr>';
            }).join('');
            
            // 渲染分页
            renderPagination(sorted.length, totalPages);
            
            // 更新排序图标
            document.querySelectorAll('.data-table th').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
                if (th.getAttribute('onclick')?.includes(sortColumn)) {
                    th.classList.add(sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
                }
            });
        }
        
        // 渲染分页
        function renderPagination(total, totalPages) {
            const pagination = document.getElementById('pagination');
            if (pageSize === 'all') {
                pagination.innerHTML = `<span class="pagination-info">共 ${total} 条</span>`;
                return;
            }
            
            let html = `<span class="pagination-info">共 ${total} 条，第 ${currentPage}/${totalPages} 页</span>`;
            html += '<div class="pagination-controls">';
            html += `<button onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
            html += `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            // 页码
            const maxPages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxPages / 2));
            let endPage = Math.min(totalPages, startPage + maxPages - 1);
            if (endPage - startPage < maxPages - 1) startPage = Math.max(1, endPage - maxPages + 1);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button onclick="goPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            html += `<button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<button onclick="goPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>`;
            html += '</div>';
            
            pagination.innerHTML = html;
        }
        
        // 跳转页面
        function goPage(page) {
            currentPage = page;
            renderListView();
        }
        
        // 改变每页显示数
        function changePageSize() {
            pageSize = document.getElementById('pageSize').value;
            currentPage = 1;
            renderListView();
        }
        
        // 排序
        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderListView();
        }
        
        function saveSettings() {
            gameData.settings.drawCost = parseInt(document.getElementById('drawCost').value);
            gameData.settings.currencyName = document.getElementById('currencyName').value;
            downloadJson();
            alert('设置已保存！请将 data/cards/' + currentPool + '.json 文件内容同步到服务器。');
        }
        
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加新卡牌';
            document.getElementById('cardForm').reset();
            document.getElementById('cardId').value = '';
            document.getElementById('cardModal').classList.add('show');
        }
        
        function editCard(id) {
            const c = gameData.characters.find(x => x.id === id);
            if (!c) return;
            document.getElementById('modalTitle').textContent = '编辑卡牌';
            document.getElementById('cardId').value = c.id;
            document.getElementById('cardName').value = c.name;
            document.getElementById('cardRarity').value = c.rarity;
            document.getElementById('cardImage').value = c.image || '';
            document.getElementById('cardDesc').value = c.description || '';
            document.getElementById('cardTags').value = (c.tags || []).join(', ');
            document.getElementById('cardDrawWeight').value = c.draw_weight || 100;
            document.getElementById('baseHp').value = c.baseStats.HP;
            document.getElementById('baseAttack').value = c.baseStats.ATK;
            document.getElementById('baseDefense').value = c.baseStats.DEF;
            document.getElementById('baseSkl').value = c.baseStats.SKL || 0;
            document.getElementById('baseSpd').value = c.baseStats.SPD || 0;
            document.getElementById('growthHp').value = c.growthStats.HP;
            document.getElementById('growthAtk').value = c.growthStats.ATK || c.growthStats.ATK || 0;
            document.getElementById('growthDef').value = c.growthStats.DEF || c.growthStats.DEFense || 0;
            document.getElementById('growthSkl').value = c.growthStats.SKL || 0;
            document.getElementById('growthSpd').value = c.growthStats.SPD || 0;
            document.getElementById('cardModal').classList.add('show');
        }
        
        function deleteCard(id) {
            var card = gameData.characters.find(c => c.id === id);
            var msg = card ? '确定删除角色「' + card.name + '」吗？' : '确定删除该角色吗？';
            if (!confirm(msg)) return;
            gameData.characters = gameData.characters.filter(c => c.id !== id);
            downloadJson();
            renderCards();
            renderListView();
            drawRarityPieChart();
            
        }
        
        function closeModal() {
            document.getElementById('cardModal').classList.remove('show');
        }
        
        document.getElementById('cardForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('cardId').value;
            const card = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('cardName').value,
                rarity: parseInt(document.getElementById('cardRarity').value),
                image: document.getElementById('cardImage').value,
                description: document.getElementById('cardDesc').value,
                tags: document.getElementById('cardTags').value.split(',').map(t => t.trim()).filter(t => t),
                draw_weight: parseInt(document.getElementById('cardDrawWeight').value) || 100,
                baseStats: {
                    HP: parseFloat(document.getElementById('baseHp').value),
                    ATK: parseFloat(document.getElementById('baseAttack').value),
                    DEF: parseFloat(document.getElementById('baseDefense').value),
                    SKL: parseFloat(document.getElementById('baseSkl').value),
                    SPD: parseFloat(document.getElementById('baseSpd').value)
                },
                growthStats: {
                    HP: parseFloat(document.getElementById('growthHp').value),
                    ATK: parseFloat(document.getElementById('growthAtk').value),
                    DEF: parseFloat(document.getElementById('growthDef').value),
                    SKL: parseFloat(document.getElementById('growthSkl').value),
                    SPD: parseFloat(document.getElementById('growthSpd').value)
                }
            };
            if (id) {
                const i = gameData.characters.findIndex(x => x.id === parseInt(id));
                if (i !== -1) gameData.characters[i] = card;
            } else {
                gameData.characters.push(card);
            }
            // 保存到数据库
            const formData = new FormData();
            formData.append('action', 'save_card');
            formData.append('id', card.id);
            formData.append('name', card.name);
            formData.append('rarity', card.rarity);
            formData.append('image', card.image);
            formData.append('description', card.description);
            formData.append('base_stats', JSON.stringify(card.baseStats));
            formData.append('growth_stats', JSON.stringify(card.growthStats));
            formData.append('tags', JSON.stringify(card.tags));
            formData.append('draw_weight', card.draw_weight);
            formData.append('pool_name', currentPool);
            
            fetch('game_api.php', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(result => {
                    if (result.code === 200) {
                        console.log('已保存到数据库');
                    }
                });
            
            closeModal();
            renderCards();
            renderListView();
            drawRarityPieChart();
            
        };
        
        function downloadJson() {
            const data = JSON.stringify(gameData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = currentPool + '.json';
            a.click();
        }
        
        async function saveToServer() {
            // 从表单获取数据
            const card = {
                id: parseInt(document.getElementById('cardId').value),
                name: document.getElementById('cardName').value,
                rarity: parseInt(document.getElementById('cardRarity').value),
                image: document.getElementById('cardImage').value,
                description: document.getElementById('cardDescription').value,
                baseStats: {
                    HP: parseFloat(document.getElementById('baseHp').value) || 0,
                    ATK: parseFloat(document.getElementById('baseAttack').value) || 0,
                    DEF: parseFloat(document.getElementById('baseDefense').value) || 0,
                    SKL: parseFloat(document.getElementById('baseSkl').value) || 0,
                    SPD: parseFloat(document.getElementById('baseSpd').value) || 0
                },
                growthStats: {
                    HP: parseFloat(document.getElementById('growthHp').value) || 0,
                    ATK: parseFloat(document.getElementById('growthAtk').value) || 0,
                    DEF: parseFloat(document.getElementById('growthDef').value) || 0,
                    SKL: parseFloat(document.getElementById('growthSkl').value) || 0,
                    SPD: parseFloat(document.getElementById('growthSpd').value) || 0
                },
                tags: document.getElementById('cardTags').value.split(',').map(t=>t.trim()).filter(t=>t),
                draw_weight: parseInt(document.getElementById('cardWeight').value) || 100,
                pool_name: currentPool
            };
            try {
                const formData = new FormData();
                formData.append('action', 'save_card');
                formData.append('id', card.id);
                formData.append('name', card.name);
                formData.append('rarity', card.rarity);
                formData.append('image', card.image);
                formData.append('description', card.description);
                formData.append('base_stats', JSON.stringify(card.baseStats));
                formData.append('growth_stats', JSON.stringify(card.growthStats));
                formData.append('tags', JSON.stringify(card.tags));
                formData.append('draw_weight', card.draw_weight);
                formData.append('pool_name', card.pool_name);
                
                const res = await fetch('game_api.php?action=save_card', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (result.code === 200) {
                    alert('保存成功！');
                } else {
                    alert('保存失败: ' + result.msg);
                }
            } catch(e) {
                alert('保存失败: ' + e.message);
            }
        }
        
        loadData();
    </script>
    <div style="text-align:center;margin:20px 0;">
        <a href="index.html" style="color:#aaa;text-decoration:none;padding:10px 20px;">🏠 返回主页</a>
    </div>
</body>
